function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function playerLabel(i) { return 'Jogador ' + (i + 1); }

function Screen({ children }) {

function Tag({ children, color }) {
  return React.createElement('div', {
    style: { ...sh.tag, color: color || '#c9a96e', borderColor: color ? color + '44' : '#2a2a2a' }
  }, children);
}
function Btn({ children, onClick, disabled, ghost, style: extra }) {
  return React.createElement('button', {
    style: { ...(ghost ? sh.ghostBtn : sh.btn), opacity: disabled ? 0.35 : 1, ...extra },
    onClick, disabled

}
function CountdownRing({ countdown, total, color }) {
  const pct = total > 0 ? (countdown / total) * 163 : 0;
  return React.createElement('div', { style: sh.countdownRing },
    React.createElement('svg', { width: 64, height: 64, viewBox: '0 0 64 64' },

        stroke: color || '#e8e2d9', strokeWidth: 3,
        strokeDasharray: pct + ' 163',

        style: { transition: 'stroke-dasharray 0.9s linear' }
      })
    ),
    React.createElement('span', { style: sh.countdownNum }, countdown)
  );
}
function RuleRow({ icon, text }) {

}

async function generateImpostorPairs(usedKeys) {
  const usedStr = usedKeys.length > 0 ? 'Pares já usados (NÃO repita): ' + usedKeys.join(', ') + '.' : '';
  const prompt = 'Você é um gerador de pares de palavras para o jogo Impostor.\nRegras: a maioria recebe a mesma palavra, 1 recebe uma DIFERENTE mas relacionada ao mesmo tema.\n' + usedStr + '\nGere EXATAMENTE 15 pares em português brasileiro, categorias VARIADAS e CRIATIVAS.\nResponda SOMENTE JSON válido, sem markdown:\n[{"category":"...","words":["A","B"],"hint":"Dica curta de como falar sem entregar a palavra"},...]';
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] }),
  });
  const data = await res.json();
  const text = (data.content || []).find(b => b.type === 'text')?.text || '[]';
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

// ── IMPOSTOR GAME ─────────────────────────────────────
function ImpostorGame({ numPlayers, onBack }) {
  const IP = { IDLE:'idle', MODE:'mode', CATEGORY:'cat', REVEAL:'reveal', SHOWN:'shown', DONE:'done' };
  const [mode, setMode] = useState(null);
  const [round, setRound] = useState(null);
  const [cur, setCur] = useState(0);
  const [phase, setPhase] = useState(IP.IDLE);
  const [countdown, setCountdown] = useState(null);
  const [totalCD, setTotalCD] = useState(4);
  const [loading, setLoading] = useState(false);
  const deckRef = useRef(shuffle(BASE_PAIRS));
  const usedRef = useRef([]);
  const roundNumRef = useRef(0);
  const prefRef = useRef(false);

  const maybePrefetch = async () => {
    if (prefRef.current || deckRef.current.length >= 8) return;
    prefRef.current = true;
    try {
      const keys = usedRef.current.map(p => p.words[0] + '/' + p.words[1]);
      const fresh = await generateImpostorPairs(keys);
      const existing = new Set([...deckRef.current, ...usedRef.current].map(p => p.words[0] + '/' + p.words[1]));
      deckRef.current = [...deckRef.current, ...shuffle(fresh.filter(p => !existing.has(p.words[0] + '/' + p.words[1])))];
    } catch(e) {}
    prefRef.current = false;
  };

  const pickNext = () => {
    if (deckRef.current.length === 0) {
      const recycle = usedRef.current.splice(0, Math.max(0, usedRef.current.length - 20));
      deckRef.current = shuffle(recycle);
    }
    const entry = deckRef.current.shift();
    usedRef.current.push(entry);
    if (usedRef.current.length > 20) usedRef.current.shift();
    return entry;
  };

  const buildRound = (m) => {
    const entry = pickNext();
    const [a, b] = entry.words;
    const [majority, minority] = Math.random() < 0.5 ? [a, b] : [b, a];
    const impostorIdx = Math.floor(Math.random() * numPlayers);
    const speakerIdx = Math.floor(Math.random() * numPlayers);
    let words = Array(numPlayers).fill(majority);
    if (m === 'classic') words[impostorIdx] = minority;
    else words[impostorIdx] = '__IMPOSTOR__';
    roundNumRef.current += 1;
    return { words, category: entry.category, hint: entry.hint, impostorIdx, speakerIdx };
  };

  const startGame = async () => {
    setLoading(true);
    if (deckRef.current.length < 3) {
      try {
        const keys = usedRef.current.map(p => p.words[0] + '/' + p.words[1]);
        const fresh = await generateImpostorPairs(keys);
        const existing = new Set([...deckRef.current, ...usedRef.current].map(p => p.words[0] + '/' + p.words[1]));
        deckRef.current = [...deckRef.current, ...shuffle(fresh.filter(p => !existing.has(p.words[0] + '/' + p.words[1])))];
      } catch(e) {}
    }
    setRound(buildRound(mode));
    setCur(0); setPhase(IP.CATEGORY); setLoading(false);
    maybePrefetch();
  };

  const showWord = () => {
    const imp = round?.words[cur] === '__IMPOSTOR__';
    const first = round?.speakerIdx === cur;
    const secs = imp ? (first ? 7 : 5) : 4;
    setTotalCD(secs); setCountdown(secs); setPhase(IP.SHOWN);
  };

  useEffect(() => {
    if (phase !== IP.SHOWN || countdown === null) return;
    if (countdown <= 0) {
      if (cur < numPlayers - 1) { setCur(p => p + 1); setPhase(IP.REVEAL); setCountdown(null); }
      else { setPhase(IP.DONE); setCountdown(null); }
      return;
    }
    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, countdown, cur]);

  const resetGame = () => { setRound(null); setMode(null); setCur(0); setPhase(IP.IDLE); setCountdown(null); };
  const isImp = round?.words[cur] === '__IMPOSTOR__';
  const showHint = isImp && round?.speakerIdx === cur;

  const e = React.createElement;

  if (phase === IP.IDLE) return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e('div', { style: sh.gameHeader },
        e('button', { style: sh.backBtn, onClick: onBack }, '← Hub'),
        e('div', { style: sh.gameTitleSmall }, 'impostor', e('span', { style: sh.gameTitleDot }, '.'))
      ),
      e('p', { style: sh.eyebrow }, numPlayers + ' jogadores · 1 impostor'),
      e('p', { style: sh.eyebrow }, 'Escolha o modo'),
      e('div', { style: sh.modeGrid },
        e('button', { style: sh.modeCard, onClick: () => { setMode('classic'); setPhase(IP.MODE); } },
          e('span', { style: sh.modeEmoji }, '🃏'),
          e('span', { style: sh.modeName }, 'Clássico'),
          e('span', { style: sh.modeDesc }, 'Todos recebem uma palavra — o impostor recebe a diferente')
        ),
        e('button', { style: sh.modeCard, onClick: () => { setMode('blind'); setPhase(IP.MODE); } },
          e('span', { style: sh.modeEmoji }, '🕵️'),
          e('span', { style: sh.modeName }, 'Impostor Cego'),
          e('span', { style: sh.modeDesc }, 'O impostor sabe que é o impostor, mas não sabe a palavra')
        )
      )
    )
  );

  if (phase === IP.MODE) return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e('div', { style: sh.gameHeader },
        e('button', { style: sh.backBtn, onClick: resetGame }, '← Voltar')
      ),
      e('div', { style: { fontSize: 56 } }, mode === 'classic' ? '🃏' : '🕵️'),
      e('p', { style: sh.modeConfirmName }, 'Modo ' + (mode === 'classic' ? 'Clássico' : 'Impostor Cego')),
      e('p', { style: sh.instruction },
        mode === 'classic'
          ? 'Todos recebem uma palavra — mas um deles recebe a diferente. Descubram quem é o impostor!'
          : (numPlayers - 1) + ' jogadores recebem a mesma palavra. O restante sabe que é o impostor, mas não sabe a palavra!'
      ),
      loading
        ? e('div', { style: sh.loadingBox }, e('span', { style: sh.loadingDot }), e('span', { style: sh.loadingText }, 'Gerando palavras...'))
        : e(Btn, { onClick: startGame }, 'Iniciar jogo')
    )
  );

  if (phase === IP.CATEGORY && round) return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e('div', { style: sh.roundBadge }, 'Rodada ' + roundNumRef.current),
      e('p', { style: sh.eyebrow }, 'Tema da rodada'),
      e('div', { style: sh.categoryBox },
        e('span', { style: { fontSize: 48 } }, CAT_ICONS[round.category] || '🎯'),
        e('span', { style: sh.categoryText }, round.category)
      ),
      e('p', { style: sh.instruction }, 'Todos podem ver o tema — mas um de vocês é o impostor!'),
      e(Btn, { onClick: () => setPhase(IP.REVEAL) }, 'Começar revelação')
    )
  );

  if (phase === IP.REVEAL) return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e(Tag, null, playerLabel(cur)),
      e('div', { style: sh.themePill },
        e('span', null, CAT_ICONS[round.category] || '🎯'),
        e('span', { style: sh.themePillText }, round.category)
      ),
      e('p', { style: sh.instruction }, 'Segure o celular sozinho e toque para ver sua informação'),
      e('button', { style: sh.bigBtn, onClick: showWord }, 'Ver palavra')
    )
  );

  if (phase === IP.SHOWN) return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e(Tag, null, playerLabel(cur)),
      isImp
        ? e('div', { style: sh.impostorBox },
            e('span', { style: { fontSize: 32 } }, '🕵️'),
            e('span', { style: sh.impostorLabel }, 'Você é o'),
            e('span', { style: sh.impostorWord }, 'IMPOSTOR'),
            showHint
              ? e('div', { style: sh.hintBox },
                  e('span', { style: sh.hintLabel }, '💡 Dica para começar'),
                  e('span', { style: sh.hintText }, round.hint)
                )
              : e('span', { style: sh.impostorSubhint }, 'Finja que sabe e não seja pego!')
          )
        : e('div', { style: sh.wordBox }, e('span', { style: sh.wordText }, round.words[cur])),
      e(CountdownRing, { countdown, total: totalCD, color: isImp ? '#7c3f3f' : '#e8e2d9' }),
      e('p', { style: sh.hint }, isImp ? 'Memorize. Ninguém pode saber.' : 'A palavra desaparecerá em breve')
    )
  );

  if (phase === IP.DONE) return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e('div', { style: sh.gameTitleSmall }, 'impostor', e('span', { style: sh.gameTitleDot }, '.')),
      e('div', { style: sh.themePill },
        e('span', null, CAT_ICONS[round.category] || '🎯'),
        e('span', { style: sh.themePillText }, round.category)
      ),
      e('div', { style: sh.speakerBox },
        e('p', { style: sh.speakerEyebrow }, 'Começa falando'),
        e('p', { style: sh.speakerName }, playerLabel(round.speakerIdx)),
        e('p', { style: sh.speakerSub }, 'Os outros podem falar em qualquer ordem depois')
      ),
      e(Btn, { onClick: () => { setRound(null); setCur(0); setPhase(IP.MODE); } }, 'Jogar novamente'),
      e(Btn, { ghost: true, onClick: onBack }, 'Menu do hub')
    )
  );

  return null;
}

// ── JOGO DA IDADE ─────────────────────────────────────
function AgeGame({ numPlayers, onBack }) {
  const AP = { IDLE:'idle', REVEAL:'reveal', SHOWN:'shown', DONE:'done' };
  const [phase, setPhase] = useState(AP.IDLE);
  const [ages, setAges] = useState([]);
  const [cur, setCur] = useState(0);
  const [countdown, setCountdown] = useState(null);

  const generateAges = () => {
    const pool = [];
    while (pool.length < numPlayers) {
      const age = Math.floor(Math.random() * 95) + 5;
      if (!pool.includes(age)) pool.push(age);
    }
    return pool;
  };

function ScoreWheel({ onDone }) {
  const [spinning, setSpinning] = useState(false);
  const [angle, setAngle] = useState(0);
  const [result, setResult] = useState(null);
  const [visible, setVisible] = useState(false);
  const [countdown, setCountdown] = useState(null);
  const rafRef = useRef(null);
  const startAngleRef = useRef(0);
  const startTimeRef = useRef(null);
  const targetAngleRef = useRef(0);
  const durationRef = useRef(0);
  const e = React.createElement;

  const SEGMENTS = 11; // 0..10
  const SEG_DEG = 360 / SEGMENTS;

  const spin = () => {
    if (spinning || result !== null) return;
    const score = Math.floor(Math.random() * 11);
    // Segment i is drawn starting at i*SEG_DEG from top.
    // Center of segment 'score' is at: score*SEG_DEG + SEG_DEG/2 (in wheel local coords, from top)
    // To put that center under the top pointer, we rotate the wheel by -(center angle).
    // normalizedTarget is the final CSS rotation angle (mod 360) we want.
    const segCenter = score * SEG_DEG + SEG_DEG / 2;
    const normalizedTarget = ((360 - segCenter) % 360);
    const currentMod = ((angle % 360) + 360) % 360;
    const diff = ((normalizedTarget - currentMod) + 360) % 360;
    const fullSpins = (5 + Math.floor(Math.random() * 3)) * 360;
    const target = angle + fullSpins + diff;
    startAngleRef.current = angle;
    targetAngleRef.current = target;
    durationRef.current = 2200;
    startTimeRef.current = null;
    setSpinning(true);

    const animate = (ts) => {
      if (!startTimeRef.current) startTimeRef.current = ts;
      const elapsed = ts - startTimeRef.current;
      const progress = Math.min(elapsed / durationRef.current, 1);
      // ease out cubic
      const eased = 1 - Math.pow(1 - progress, 3);
      const cur = startAngleRef.current + (targetAngleRef.current - startAngleRef.current) * eased;
      setAngle(cur);
      if (progress < 1) {
        rafRef.current = requestAnimationFrame(animate);
      } else {
        setAngle(targetAngleRef.current);
        setSpinning(false);
        setResult(score);
        setVisible(true);
        setCountdown(4);
      }
    };
    rafRef.current = requestAnimationFrame(animate);
  };

  useEffect(() => {
    if (countdown === null || !visible) return;
    if (countdown <= 0) { setVisible(false); setTimeout(() => onDone(result), 300); return; }
    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [countdown, visible]);

  useEffect(() => () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); }, []);

  const cx = 140, cy = 140, r = 120;
  const colors = ['#1a0a0a','#1a1008','#0a1a08','#081018','#160818','#0a0a18','#180808','#081808','#181008','#080818','#0a1810'];
  const textColors = ['#e05555','#c9903a','#4aaa4a','#4a9fd4','#a04ad4','#4a6ad4','#e05555','#4aaa4a','#c9903a','#a04ad4','#c9a96e'];

  const segments = Array.from({ length: SEGMENTS }, (_, i) => {
    const startDeg = i * SEG_DEG;
    const endDeg = startDeg + SEG_DEG;
    const startRad = (startDeg - 90) * Math.PI / 180;
    const endRad = (endDeg - 90) * Math.PI / 180;
    const x1 = cx + r * Math.cos(startRad);
    const y1 = cy + r * Math.sin(startRad);
    const x2 = cx + r * Math.cos(endRad);
    const y2 = cy + r * Math.sin(endRad);
    const midRad = ((startDeg + endDeg) / 2 - 90) * Math.PI / 180;
    const tx = cx + (r * 0.68) * Math.cos(midRad);
    const ty = cy + (r * 0.68) * Math.sin(midRad);
    const d = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`;
    return { i, d, tx, ty };
  });

  const sd = result !== null ? SCORE_DESCS[result] : null;

  return e('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 20, width: '100%' } },
    // Wheel container
    e('div', { style: { position: 'relative', width: 280, height: 280 } },
      // Pointer
      e('div', { style: {
        position: 'absolute', top: -6, left: '50%', transform: 'translateX(-50%)',
        width: 0, height: 0,
        borderLeft: '10px solid transparent', borderRight: '10px solid transparent',
        borderTop: '20px solid #e8e2d9', zIndex: 10,
      }}),
      // SVG wheel
      e('svg', { width: 280, height: 280, viewBox: '0 0 280 280', style: { transform: 'rotate(' + angle + 'deg)', transition: spinning ? 'none' : 'none', display: 'block' } },
        // Segments
        ...segments.map(seg =>
          e('g', { key: seg.i },
            e('path', { d: seg.d, fill: colors[seg.i], stroke: '#0a0a0a', strokeWidth: 2 }),
            e('text', { x: seg.tx, y: seg.ty, textAnchor: 'middle', dominantBaseline: 'middle',
              fill: textColors[seg.i], fontSize: 16, fontWeight: 600,
              fontFamily: "'DM Serif Display',Georgia,serif" }, seg.i)
          )
        ),
        // Center circle
        e('circle', { cx, cy, r: 18, fill: '#0a0a0a', stroke: '#222', strokeWidth: 2 }),
      ),
    ),

    // Spin button or result
    result === null
      ? e('button', {
          style: { ...sh.bigBtn, opacity: spinning ? 0.5 : 1, minWidth: 180 },
          onClick: spin, disabled: spinning
        }, spinning ? 'Girando...' : '🎰 Girar roleta')
      : visible
        ? e('div', { style: { background: '#111', border: '1px solid #222', borderRadius: 6, padding: '20px 28px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, width: '100%', boxSizing: 'border-box' } },
            e('span', { style: { fontSize: 32 } }, sd.emoji),
            e('span', { style: { color: '#555', fontSize: 10, letterSpacing: '3px', textTransform: 'uppercase' } }, 'sua nota é'),
            e('span', { style: { color: '#e8e2d9', fontSize: 56, fontWeight: 300, fontFamily: "'DM Serif Display',Georgia,serif", lineHeight: 1 } }, result),
            e('span', { style: { color: textColors[result], fontSize: 13, letterSpacing: '1px', textTransform: 'uppercase', fontWeight: 500 } }, sd.label),
            e('span', { style: { color: '#555', fontSize: 12, textAlign: 'center', lineHeight: '1.6' } }, sd.desc),
            e(CountdownRing, { countdown, total: 4, color: textColors[result] }),
            e('p', { style: sh.hint }, 'A nota desaparecerá em breve')
          )
        : null
  );
}

  }, []);

  // Listen to room changes
  useEffect(() => {
    if (!roomCode || screen === 'home' || screen === 'create' || screen === 'join') return;
    const ref = firebase.database().ref('rooms/' + roomCode);
    roomRef.current = ref;
    const unsub = ref.on('value', snap => {
      const data = snap.val();
      if (!data) return;
      const plist = Object.entries(data.players || {}).map(([id, p]) => ({ id, ...p }));
      setPlayers(plist);
      if (data.gameState) setGameState(data.gameState);
    });
    return () => ref.off('value', unsub);
  }, [roomCode, screen]);

  // Cleanup on leave
  useEffect(() => {
    return () => {
      if (myRef.current) myRef.current.remove();
    };
  }, []);

  const createRoom = async () => {
    if (!nameInput.trim()) { setError('Digite seu nome'); return; }
    const code = genCode();
    const id = 'p_' + Date.now();
    const player = { name: nameInput.trim(), host: true, joined: Date.now() };
    await firebase.database().ref('rooms/' + code + '/players/' + id).set(player);
    await firebase.database().ref('rooms/' + code + '/status').set('waiting');
    myRef.current = firebase.database().ref('rooms/' + code + '/players/' + id);
    setRoomCode(code);
    setPlayerName(nameInput.trim());
    setMyId(id);
    setIsHost(true);
    setScreen('waiting');
  };

  const joinRoom = async () => {
    if (!nameInput.trim()) { setError('Digite seu nome'); return; }
    if (!inputCode.trim()) { setError('Digite o código da sala'); return; }
    const code = inputCode.trim().toUpperCase();
    const snap = await firebase.database().ref('rooms/' + code).once('value');
    if (!snap.exists()) { setError('Sala não encontrada'); return; }
    const id = 'p_' + Date.now();
    const player = { name: nameInput.trim(), host: false, joined: Date.now() };
    await firebase.database().ref('rooms/' + code + '/players/' + id).set(player);
    myRef.current = firebase.database().ref('rooms/' + code + '/players/' + id);
    setRoomCode(code);
    setPlayerName(nameInput.trim());
    setMyId(id);
    setIsHost(false);
    setScreen('waiting');
  };

  const startOnlineGame = async (gameId) => {
    // Host picks a game and writes it to Firebase — all clients navigate
    await firebase.database().ref('rooms/' + roomCode + '/gameState').set({
      game: gameId,
      startedAt: Date.now(),
      numPlayers: players.length,
    });
  };

  // When gameState arrives, navigate to game (all clients)
  useEffect(() => {
    if (gameState && gameState.game && screen === 'waiting') {
      setSelectedGame(gameState.game);
      setNumPlayers(gameState.numPlayers);
      setScreen('game');
    }
  }, [gameState, screen]);

  const leaveRoom = () => {
    if (myRef.current) myRef.current.remove();
    myRef.current = null;
    setRoomCode(''); setPlayers([]); setIsHost(false);
    setMyId(null); setGameState(null); setSelectedGame(null);
    setScreen('home');
  };

  // ── HOME ──
  if (screen === 'home') return e('div', { style: sh.hubRoot },
    e('div', { style: sh.hubBg }),
    e('div', { style: { ...sh.hubScreen, gap: 28 } },
      e('div', { style: sh.hubHeader },
        e('div', { style: sh.hubLogo },
          e('span', { style: sh.hubLogoText }, 'jogos'),
          e('span', { style: sh.hubLogoDot }, '.')
        ),
        e('p', { style: sh.hubSubtitle }, 'cada um no próprio celular')
      ),
      e('div', { style: sh.modeGrid },
        e('button', { style: sh.modeCard, onClick: () => { setError(''); setScreen('create'); } },
          e('span', { style: sh.modeEmoji }, '🏠'),
          e('span', { style: sh.modeName }, 'Criar sala'),
          e('span', { style: sh.modeDesc }, 'Gere um código e compartilhe com seus amigos')
        ),
        e('button', { style: sh.modeCard, onClick: () => { setError(''); setScreen('join'); } },
          e('span', { style: sh.modeEmoji }, '🚪'),
          e('span', { style: sh.modeName }, 'Entrar na sala'),
          e('span', { style: sh.modeDesc }, 'Digite o código recebido para entrar')
        )
      ),
      e('div', { style: { borderTop: '1px solid #1a1a1a', width: '100%', paddingTop: 20 } },
        e('p', { style: { ...sh.eyebrow, textAlign: 'center', marginBottom: 16 } }, 'ou jogue no mesmo celular'),
        e('button', { style: { ...sh.ghostBtn, width: '100%' }, onClick: () => setScreen('local') }, 'Modo local →')
      )
    )
  );

  // ── LOCAL MODE (original Hub) ──
  if (screen === 'local') return e(LocalHub, { onBack: () => setScreen('home') });

  // ── CREATE ──
  if (screen === 'create') return e('div', { style: sh.hubRoot },
    e('div', { style: sh.hubBg }),
    e('div', { style: { ...sh.hubScreen, gap: 20 } },
      e('button', { style: sh.backBtn, onClick: () => setScreen('home') }, '← Voltar'),
      e('span', { style: { fontSize: 48 } }, '🏠'),
      e('p', { style: { ...sh.modeConfirmName, textAlign: 'center' } }, 'Criar sala'),
      e('input', {
        type: 'text', placeholder: 'Seu nome',
        value: nameInput, onChange: ev => { setNameInput(ev.target.value); setError(''); },
        style: { ...inputStyle }
      }),
      error ? e('p', { style: errorStyle }, error) : null,
      e(Btn, { onClick: createRoom }, 'Criar sala')
    )
  );

  // ── JOIN ──
  if (screen === 'join') return e('div', { style: sh.hubRoot },
    e('div', { style: sh.hubBg }),
    e('div', { style: { ...sh.hubScreen, gap: 20 } },
      e('button', { style: sh.backBtn, onClick: () => setScreen('home') }, '← Voltar'),
      e('span', { style: { fontSize: 48 } }, '🚪'),
      e('p', { style: { ...sh.modeConfirmName, textAlign: 'center' } }, 'Entrar na sala'),
      e('input', {
        type: 'text', placeholder: 'Seu nome',
        value: nameInput, onChange: ev => { setNameInput(ev.target.value); setError(''); },
        style: { ...inputStyle }
      }),
      e('input', {
        type: 'text', placeholder: 'Código da sala (ex: AB3X7)',
        value: inputCode, onChange: ev => { setInputCode(ev.target.value.toUpperCase()); setError(''); },
        style: { ...inputStyle, letterSpacing: 4, textTransform: 'uppercase', textAlign: 'center', fontSize: 22 }
      }),
      error ? e('p', { style: errorStyle }, error) : null,
      e(Btn, { onClick: joinRoom }, 'Entrar')
    )
  );

  // ── WAITING ROOM ──
  if (screen === 'waiting') return e('div', { style: sh.hubRoot },
    e('div', { style: sh.hubBg }),
    e('div', { style: { ...sh.hubScreen, gap: 20 } },
      e('button', { style: sh.backBtn, onClick: leaveRoom }, '← Sair da sala'),
      e('p', { style: sh.eyebrow }, 'Código da sala'),
      e('div', { style: {
        background: '#111', border: '1px solid #222', borderRadius: 8,
        padding: '20px 32px', textAlign: 'center', width: '100%'
      } },
        e('span', { style: { color: '#c9a96e', fontSize: 40, fontWeight: 700, letterSpacing: 8, fontFamily: "'DM Serif Display',Georgia,serif" } }, roomCode),
        e('p', { style: { color: '#444', fontSize: 11, letterSpacing: '2px', textTransform: 'uppercase', marginTop: 8 } }, 'Compartilhe com seus amigos')
      ),
      e('div', { style: { width: '100%' } },
        e('p', { style: { ...sh.eyebrow, marginBottom: 12 } }, players.length + ' na sala'),
        e('div', { style: { display: 'flex', flexDirection: 'column', gap: 8 } },
          ...players.map((p, i) =>
            e('div', { key: p.id, style: {
              background: '#111', border: '1px solid #1a1a1a', borderRadius: 4,
              padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 10
            } },
              e('span', { style: { fontSize: 16 } }, p.host ? '👑' : '👤'),
              e('span', { style: { color: '#e8e2d9', fontSize: 14 } }, p.name),
              p.id === myId ? e('span', { style: { color: '#444', fontSize: 11, marginLeft: 'auto' } }, '(você)') : null
            )
          )
        )
      ),
      isHost && players.length >= 2
        ? e('div', { style: { width: '100%' } },
            e('p', { style: { ...sh.eyebrow, marginBottom: 12, textAlign: 'center' } }, 'Escolha o jogo'),
            e('div', { style: sh.gameGrid },
              ...GAMES.map(g =>
                e('button', { key: g.id, style: sh.modeCard, onClick: () => startOnlineGame(g.id) },
                  e('span', { style: sh.modeEmoji }, g.emoji),
                  e('span', { style: { ...sh.modeName, color: g.nameColor } }, g.name),
                  e('span', { style: sh.modeDesc }, g.desc)
                )
              )
            )
          )
        : isHost
          ? e('p', { style: sh.instruction }, 'Aguardando mais jogadores entrarem...')
          : e('p', { style: sh.instruction }, 'Aguardando o host iniciar o jogo...')
    )
  );

  // ── GAME (online: each player sees their own screen) ──
  if (screen === 'game' && selectedGame && numPlayers) {
    // Find my index among sorted players
    const sorted = [...players].sort((a, b) => a.joined - b.joined);
    const myIndex = sorted.findIndex(p => p.id === myId);
    const onBack = leaveRoom;

    if (selectedGame === 'impostor') return e(OnlineImpostorGame, { 
      numPlayers, myIndex, myName: playerName, players: sorted,
      roomCode, isHost, db, myId, onBack 
    });
    if (selectedGame === 'age') return e(OnlineAgeGame, { 
      numPlayers, myIndex, myName: playerName, players: sorted,
      roomCode, isHost, db, onBack 
    });
    if (selectedGame === 'score') return e(OnlineScoreGame, { 
      numPlayers, myIndex, myName: playerName, players: sorted,
      roomCode, isHost, db, myId, onBack 
    });
  }

  return null;
}

const inputStyle = {
  width: '100%', background: '#111', border: '1px solid #222', borderRadius: 4,

};

// ── ONLINE IMPOSTOR ────────────────────────────────────
function OnlineImpostorGame({ numPlayers, myIndex, myName, players, roomCode, isHost, db, myId, onBack }) {
  const [phase, setPhase] = useState('idle'); // idle | mode | category | shown | done
  const [mode, setMode] = useState(null);
  const [myWord, setMyWord] = useState(null);
  const [category, setCategory] = useState(null);
  const [hint, setHint] = useState(null);
  const [speakerIdx, setSpeakerIdx] = useState(null);
  const [isImpostor, setIsImpostor] = useState(false);
  const [countdown, setCountdown] = useState(null);
  const [totalCD, setTotalCD] = useState(4);
  const [roundNum, setRoundNum] = useState(0);
  const deckRef = useRef(shuffle(BASE_PAIRS));
  const usedRef = useRef([]);
  const e = React.createElement;

  // Listen for game updates from host
  useEffect(() => {
    const ref = firebase.database().ref('rooms/' + roomCode + '/currentRound');
    ref.on('value', snap => {
      const data = snap.val();
      if (!data) return;
      setCategory(data.category);
      setHint(data.hint);
      setSpeakerIdx(data.speakerIdx);
      setRoundNum(r => r + 1);
      // Each player reads their own word
      const myWord = data.words ? data.words[myIndex] : null;
      setMyWord(myWord);
      setIsImpostor(myWord === '__IMPOSTOR__');
      setPhase('category');
    });
    return () => ref.off();
  }, [roomCode, myIndex]);

  const hostStartRound = async (m) => {
    // Host generates and pushes round data
    const entry = deckRef.current.length > 0 ? deckRef.current.shift() : BASE_PAIRS[Math.floor(Math.random() * BASE_PAIRS.length)];
    usedRef.current.push(entry);
    const [a, b] = entry.words;
    const [majority, minority] = Math.random() < 0.5 ? [a, b] : [b, a];
    const impostorIdx = Math.floor(Math.random() * numPlayers);
    const spIdx = Math.floor(Math.random() * numPlayers);
    const words = Array(numPlayers).fill(majority);
    if (m === 'classic') words[impostorIdx] = minority;
    else words[impostorIdx] = '__IMPOSTOR__';
    await firebase.database().ref('rooms/' + roomCode + '/currentRound').set({
      category: entry.category, hint: entry.hint, words, speakerIdx: spIdx, mode: m
    });
    setMode(m);
  };

  const showMyWord = () => {
    const imp = myWord === '__IMPOSTOR__';
    const first = speakerIdx === myIndex;
    const secs = imp ? (first ? 7 : 5) : 4;
    setTotalCD(secs); setCountdown(secs); setPhase('shown');
  };

  useEffect(() => {
    if (phase !== 'shown' || countdown === null) return;
    if (countdown <= 0) { setPhase('done'); setCountdown(null); return; }
    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, countdown]);

  const showHint = isImpostor && speakerIdx === myIndex;

  if (phase === 'idle' || phase === 'mode') return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e('div', { style: sh.gameHeader },
        e('button', { style: sh.backBtn, onClick: onBack }, '← Sair'),
        e('div', { style: sh.gameTitleSmall }, 'impostor', e('span', { style: sh.gameTitleDot }, '.'))
      ),
      e(Tag, null, myName),
      isHost
        ? e('div', { style: { width: '100%' } },
            e('p', { style: { ...sh.eyebrow, marginBottom: 12, textAlign: 'center' } }, 'Escolha o modo'),
            e('div', { style: sh.modeGrid },
              e('button', { style: sh.modeCard, onClick: () => hostStartRound('classic') },
                e('span', { style: sh.modeEmoji }, '🃏'),
                e('span', { style: sh.modeName }, 'Clássico'),
                e('span', { style: sh.modeDesc }, 'Todos recebem uma palavra — o impostor recebe a diferente')
              ),
              e('button', { style: sh.modeCard, onClick: () => hostStartRound('blind') },
                e('span', { style: sh.modeEmoji }, '🕵️'),
                e('span', { style: sh.modeName }, 'Impostor Cego'),
                e('span', { style: sh.modeDesc }, 'O impostor sabe que é o impostor, mas não sabe a palavra')
              )
            )
          )
        : e('p', { style: sh.instruction }, 'Aguardando o host iniciar a rodada...')
    )
  );

  if (phase === 'category') return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e('div', { style: sh.roundBadge }, 'Rodada ' + roundNum),
      e('p', { style: sh.eyebrow }, 'Tema da rodada'),
      e('div', { style: sh.categoryBox },
        e('span', { style: { fontSize: 48 } }, CAT_ICONS[category] || '🎯'),
        e('span', { style: sh.categoryText }, category)
      ),
      e('p', { style: sh.instruction }, 'Todos veem o tema — mas um de vocês é o impostor!'),
      e(Btn, { onClick: showMyWord }, 'Ver minha palavra')
    )
  );

  if (phase === 'shown') return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e(Tag, null, myName),
      isImpostor
        ? e('div', { style: sh.impostorBox },
            e('span', { style: { fontSize: 32 } }, '🕵️'),
            e('span', { style: sh.impostorLabel }, 'Você é o'),
            e('span', { style: sh.impostorWord }, 'IMPOSTOR'),
            showHint
              ? e('div', { style: sh.hintBox },
                  e('span', { style: sh.hintLabel }, '💡 Dica para começar'),
                  e('span', { style: sh.hintText }, hint)
                )
              : e('span', { style: sh.impostorSubhint }, 'Finja que sabe e não seja pego!')
          )
        : e('div', { style: sh.wordBox }, e('span', { style: sh.wordText }, myWord)),
      e(CountdownRing, { countdown, total: totalCD, color: isImpostor ? '#7c3f3f' : '#e8e2d9' }),
      e('p', { style: sh.hint }, isImpostor ? 'Memorize. Ninguém pode saber.' : 'A palavra desaparecerá em breve')
    )
  );

  if (phase === 'done') return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e('div', { style: sh.gameTitleSmall }, 'impostor', e('span', { style: sh.gameTitleDot }, '.')),
      e('div', { style: sh.themePill },
        e('span', null, CAT_ICONS[category] || '🎯'),
        e('span', { style: sh.themePillText }, category)
      ),
      e('div', { style: sh.speakerBox },
        e('p', { style: sh.speakerEyebrow }, 'Começa falando'),
        e('p', { style: sh.speakerName }, players[speakerIdx]?.name || playerLabel(speakerIdx)),
        e('p', { style: sh.speakerSub }, 'Os outros falam depois')
      ),
      isHost
        ? e(Btn, { onClick: () => setPhase('idle') }, 'Próxima rodada')
        : e('p', { style: sh.instruction }, 'Aguardando o host iniciar outra rodada...'),
      e(Btn, { ghost: true, onClick: onBack }, 'Sair da sala')
    )
  );

  return null;
}

// ── ONLINE IDADE ───────────────────────────────────────
function OnlineAgeGame({ numPlayers, myIndex, myName, players, roomCode, isHost, db, onBack }) {
  const [phase, setPhase] = useState('idle'); // idle | shown | done
  const [myAge, setMyAge] = useState(null);
  const [countdown, setCountdown] = useState(null);
  const e = React.createElement;
  const blueBg = 'radial-gradient(ellipse 80% 60% at 50% 0%, rgba(100,160,232,0.06) 0%, transparent 70%)';

  useEffect(() => {
    const ref = firebase.database().ref('rooms/' + roomCode + '/ageRound');
    ref.on('value', snap => {
      const data = snap.val();
      if (!data || !data.ages) return;
      setMyAge(data.ages[myIndex]);
      setPhase('reveal');
    });
    return () => ref.off();
  }, [roomCode, myIndex]);

  const hostStart = async () => {
    const pool = [];
    while (pool.length < numPlayers) {
      const age = Math.floor(Math.random() * 95) + 5;
      if (!pool.includes(age)) pool.push(age);
    }
    await firebase.database().ref('rooms/' + roomCode + '/ageRound').set({ ages: pool, startedAt: Date.now() });
  };

  const showMyAge = () => { setCountdown(4); setPhase('shown'); };

  useEffect(() => {
    if (phase !== 'shown' || countdown === null) return;
    if (countdown <= 0) { setPhase('done'); setCountdown(null); return; }
    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, countdown]);

  if (phase === 'idle') return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: blueBg } }),
    e(Screen, null,
      e('div', { style: sh.gameHeader },
        e('button', { style: sh.backBtn, onClick: onBack }, '← Sair'),
        e('div', { style: { ...sh.gameTitleSmall, color: '#a8d4f5' } }, 'idade', e('span', { style: { ...sh.gameTitleDot, color: '#4a9fd4' } }, '.'))
      ),
      e(Tag, { color: '#4a9fd4' }, myName),
      isHost
        ? e(Btn, { onClick: hostStart, style: { background: '#4a9fd4', color: '#0f0f0f' } }, 'Distribuir idades')
        : e('p', { style: sh.instruction }, 'Aguardando o host distribuir as idades...')
    )
  );

  if (phase === 'reveal') return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: blueBg } }),
    e(Screen, null,
      e(Tag, { color: '#4a9fd4' }, myName),
      e('p', { style: sh.instruction }, 'Toque para ver sua idade secreta'),
      e('button', { style: { ...sh.bigBtn, borderColor: '#1a3a5a' }, onClick: showMyAge }, 'Ver minha idade')
    )
  );

  if (phase === 'shown') return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: blueBg } }),
    e(Screen, null,
      e(Tag, { color: '#4a9fd4' }, myName),
      e('div', { style: { ...sh.wordBox, background: '#060e18', borderColor: '#0d2a45', flexDirection: 'column', gap: 4 } },
        e('span', { style: { color: '#4a9fd4', fontSize: 11, letterSpacing: 3, textTransform: 'uppercase' } }, 'sua idade é'),
        e('span', { style: { ...sh.wordText, fontSize: 'clamp(52px,14vw,80px)', color: '#a8d4f5', letterSpacing: -2 } }, myAge),
        e('span', { style: { color: '#1a4a6a', fontSize: 11, letterSpacing: 2, textTransform: 'uppercase' } }, 'anos')
      ),
      e(CountdownRing, { countdown, total: 4, color: '#4a9fd4' }),
      e('p', { style: sh.hint }, 'A idade desaparecerá em breve')
    )
  );

  if (phase === 'done') return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: blueBg } }),
    e(Screen, null,
      e('div', { style: { ...sh.gameTitleSmall, color: '#a8d4f5' } }, 'idade', e('span', { style: { ...sh.gameTitleDot, color: '#4a9fd4' } }, '.')),
      e('p', { style: sh.instruction }, 'Todos receberam suas idades. Façam perguntas e descubram!'),
      e('div', { style: { ...sh.ruleCard, borderColor: '#0d2a45' } },
        e(RuleRow, { icon: '❓', text: 'Perguntas como "você já foi à escola?" ou "você dirige?"' }),
        e(RuleRow, { icon: '🚫', text: 'Não pode perguntar a idade diretamente!' }),
        e(RuleRow, { icon: '🏆', text: 'Quem acertar a idade exata do outro vence' })
      ),
      isHost ? e(Btn, { onClick: hostStart, style: { background: '#4a9fd4', color: '#0f0f0f' } }, 'Nova rodada') : null,
      e(Btn, { ghost: true, onClick: onBack }, 'Sair da sala')
    )
  );

  return null;
}

// ── ONLINE NOTAS ───────────────────────────────────────
function OnlineScoreGame({ numPlayers, myIndex, myName, players, roomCode, isHost, db, myId, onBack }) {
  const [phase, setPhase] = useState('idle'); // idle | spin | done
  const [myScore, setMyScore] = useState(null);
  const [allScores, setAllScores] = useState(null);
  const greenBg = 'radial-gradient(ellipse 80% 60% at 50% 0%, rgba(80,180,80,0.05) 0%, transparent 70%)';
  const e = React.createElement;

  useEffect(() => {
    const ref = firebase.database().ref('rooms/' + roomCode + '/scoreRound');
    ref.on('value', snap => {
      const data = snap.val();
      if (!data) return;
      if (data.scores) { setAllScores(data.scores); setPhase('done'); }
      else if (data.started) { setMyScore(null); setPhase('spin'); }
    });
    return () => ref.off();
  }, [roomCode]);

  const hostStart = async () => {
    await firebase.database().ref('rooms/' + roomCode + '/scoreRound').set({ started: true, scores: null });
  };

  const handleSpinDone = async (score) => {
    setMyScore(score);
    await firebase.database().ref('rooms/' + roomCode + '/scoreRound/scores/' + myIndex).set(score);
  };

  // Check if all scores submitted → show results
  useEffect(() => {
    if (!allScores) return;
    const vals = Object.values(allScores);
    if (vals.length === numPlayers) setPhase('done');
  }, [allScores, numPlayers]);

  if (phase === 'idle') return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: greenBg } }),
    e(Screen, null,
      e('div', { style: sh.gameHeader },
        e('button', { style: sh.backBtn, onClick: onBack }, '← Sair'),
        e('div', { style: { ...sh.gameTitleSmall, color: '#a0e0a0' } }, 'notas', e('span', { style: { ...sh.gameTitleDot, color: '#4ab84a' } }, '.'))
      ),
      e(Tag, { color: '#4ab84a' }, myName),
      isHost
        ? e(Btn, { onClick: hostStart, style: { background: '#4ab84a', color: '#0a0a0a' } }, 'Iniciar rodada')
        : e('p', { style: sh.instruction }, 'Aguardando o host iniciar...')
    )
  );

  if (phase === 'spin') return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: greenBg } }),
    e(Screen, null,
      e(Tag, { color: '#4ab84a' }, myName),
      myScore !== null
        ? e('p', { style: sh.instruction }, 'Nota registrada! Aguardando os outros...')
        : e(ScoreWheel, { key: myIndex, onDone: handleSpinDone })
    )
  );

  if (phase === 'done' && allScores) return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: greenBg } }),
    e(Screen, null,
      e('div', { style: { ...sh.gameTitleSmall, color: '#a0e0a0' } }, 'notas', e('span', { style: { ...sh.gameTitleDot, color: '#4ab84a' } }, '.')),
      e('p', { style: sh.instruction }, 'Todos giraram! Agora atuem e tentem descobrir a nota uns dos outros.'),
      e('div', { style: { ...sh.ruleCard, gap: 0, padding: 0, overflow: 'hidden' } },
        e('div', { style: { padding: '12px 16px', borderBottom: '1px solid #1a1a1a' } },
          e('span', { style: { color: '#444', fontSize: 10, letterSpacing: '2px', textTransform: 'uppercase' } }, 'Ranking de notas')
        ),
        ...Object.entries(allScores)
          .map(([idx, s]) => ({ idx: parseInt(idx), s }))
          .sort((a, b) => b.s - a.s)
          .map((item, rank) => {
            const sd = SCORE_DESCS[item.s];
            const medal = rank === 0 ? '🥇' : rank === 1 ? '🥈' : rank === 2 ? '🥉' : (rank + 1) + 'º';
            const pname = players[item.idx]?.name || playerLabel(item.idx);
            return e('div', { key: item.idx, style: { display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px', borderBottom: '1px solid #111' } },
              e('span', { style: { fontSize: 16, minWidth: 28 } }, medal),
              e('span', { style: { color: '#e8e2d9', fontSize: 13, flex: 1 } }, pname),
              e('span', { style: { color: '#555', fontSize: 12 } }, sd.emoji + ' ' + sd.label),
              e('span', { style: { color: '#e8e2d9', fontSize: 20, fontWeight: 300, fontFamily: "'DM Serif Display',Georgia,serif", minWidth: 28, textAlign: 'right' } }, item.s)
            );
          })
      ),
      isHost ? e(Btn, { onClick: hostStart, style: { background: '#4ab84a', color: '#0a0a0a' } }, 'Nova rodada') : null,
      e(Btn, { ghost: true, onClick: onBack }, 'Sair da sala')
    )
  );

  if (phase === 'done') return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: greenBg } }),
    e(Screen, null, e('p', { style: sh.instruction }, 'Aguardando todos girarem a roleta...'))
  );

  return null;
}

// ── LOCAL HUB (original) ───────────────────────────────
function LocalHub({ onBack }) {
  const [screen, setScreen] = useState('hub');
  const [selectedGame, setSelectedGame] = useState(null);
  const [numPlayers, setNumPlayers] = useState(null);
  const [inputVal, setInputVal] = useState('');
  const e = React.createElement;

  const selectGame = (g) => { setSelectedGame(g); setNumPlayers(null); setInputVal(''); setScreen('players'); };
  const goHub = () => { setScreen('hub'); setSelectedGame(null); setNumPlayers(null); setInputVal(''); };
  const handleConfirm = () => {
    const n = parseInt(inputVal, 10);
    if (!n || n < 2) return;
    setNumPlayers(n); setScreen(selectedGame.id);
  };

  if (screen === 'impostor' && numPlayers) return e(ImpostorGame, { numPlayers, onBack: goHub });
  if (screen === 'age' && numPlayers) return e(AgeGame, { numPlayers, onBack: goHub });
  if (screen === 'score' && numPlayers) return e(ScoreGame, { numPlayers, onBack: goHub });

  if (screen === 'hub') return e('div', { style: sh.hubRoot },
    e('div', { style: sh.hubBg }),
    e('div', { style: sh.hubScreen },
      e('button', { style: sh.backBtn, onClick: onBack }, '← Voltar'),
      e('div', { style: sh.hubHeader },
        e('div', { style: sh.hubLogo },
          e('span', { style: sh.hubLogoText }, 'jogos'),
          e('span', { style: sh.hubLogoDot }, '.')
        ),
        e('p', { style: sh.hubSubtitle }, 'modo local — mesmo celular')
      ),
      e('div', { style: sh.gameGrid },
        ...GAMES.map(g =>
          e('button', { key: g.id, style: sh.gameCard, onClick: () => selectGame(g) },
            e('div', { style: sh.gameCardTop },
              e('span', { style: sh.gameCardEmoji }, g.emoji),
              e('div', { style: sh.gameCardTags }, ...g.tags.map(t => e('span', { key: t, style: sh.gameTag }, t)))
            ),
            e('div', { style: sh.gameCardTitle },
              e('span', { style: { ...sh.gameCardName, color: g.nameColor } }, g.name),
              e('span', { style: { ...sh.gameCardDot, color: g.dotColor } }, g.dot)
            ),
            e('p', { style: sh.gameCardDesc }, g.desc),
            e('div', { style: sh.gameCardFooter },
              e('span', { style: sh.gameCardPlayers }, 'qualquer número'),
              e('span', { style: sh.gameCardArrow }, '→')
            )
          )
        ),
        e('div', { style: sh.gameCardEmpty },
          e('span', { style: sh.gameCardEmptyPlus }, '+'),
          e('span', { style: sh.gameCardEmptyText }, 'Em breve')
        )
      )
    )
  );

  if (screen === 'players' && selectedGame) {
    const n = parseInt(inputVal, 10);
    const valid = n >= 2;
    return e('div', { style: sh.hubRoot },
      e('div', { style: sh.hubBg }),
      e('div', { style: { ...sh.hubScreen, gap: 20 } },
        e('button', { style: sh.backBtn, onClick: goHub }, '← Hub'),
        e('span', { style: { fontSize: 48 } }, selectedGame.emoji),
        e('div', { style: sh.hubLogo },
          e('span', { style: { ...sh.hubLogoText, fontSize: 'clamp(24px,6vw,34px)', color: selectedGame.nameColor } }, selectedGame.name),
          e('span', { style: { ...sh.hubLogoDot, color: selectedGame.dotColor } }, selectedGame.dot)
        ),
        e('p', { style: sh.instruction }, 'Quantos jogadores vão jogar?'),
        e('div', { style: { display: 'flex', gap: 10, width: '100%', alignItems: 'stretch' } },
          e('input', {
            type: 'number', min: 2, placeholder: 'Ex: 4',
            value: inputVal, onChange: ev => setInputVal(ev.target.value.replace(/\D/g, '')),
            style: { flex: 1, background: '#111', border: '1px solid #222', borderRadius: 4, color: '#e8e2d9', fontSize: 28, fontWeight: 300, fontFamily: "'DM Serif Display',Georgia,serif", padding: '16px 20px', outline: 'none', textAlign: 'center', letterSpacing: -1 }
          }),
          e('button', {
            style: { ...sh.btn, width: 'auto', padding: '16px 28px', opacity: valid ? 1 : 0.35, flexShrink: 0 },
            onClick: handleConfirm, disabled: !valid
          }, 'Jogar →')
        ),
        !valid && inputVal.length > 0 ? e('p', { style: { color: '#5a2a2a', fontSize: 12, margin: 0 } }, 'Mínimo de 2 jogadores') : null
      )
    );
  }
  return null;
}
