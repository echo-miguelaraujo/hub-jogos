function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function playerLabel(i) { return 'Jogador ' + (i + 1); }

function Screen({ children }) {

function Tag({ children, color }) {
  return React.createElement('div', {
    style: { ...sh.tag, color: color || '#c9a96e', borderColor: color ? color + '44' : '#2a2a2a' }
  }, children);
}
function Btn({ children, onClick, disabled, ghost, style: extra }) {
  return React.createElement('button', {
    style: { ...(ghost ? sh.ghostBtn : sh.btn), opacity: disabled ? 0.35 : 1, ...extra },
    onClick, disabled

}
function CountdownRing({ countdown, total, color }) {
  const pct = total > 0 ? (countdown / total) * 163 : 0;
  return React.createElement('div', { style: sh.countdownRing },
    React.createElement('svg', { width: 64, height: 64, viewBox: '0 0 64 64' },

        stroke: color || '#e8e2d9', strokeWidth: 3,
        strokeDasharray: pct + ' 163',

        style: { transition: 'stroke-dasharray 0.9s linear' }
      })
    ),
    React.createElement('span', { style: sh.countdownNum }, countdown)
  );
}
function RuleRow({ icon, text }) {

}

async function generateImpostorPairs(usedKeys) {
  const usedStr = usedKeys.length > 0 ? 'Pares já usados (NÃO repita): ' + usedKeys.join(', ') + '.' : '';
  const prompt = 'Você é um gerador de pares de palavras para o jogo Impostor.\nRegras: a maioria recebe a mesma palavra, 1 recebe uma DIFERENTE mas relacionada ao mesmo tema.\n' + usedStr + '\nGere EXATAMENTE 15 pares em português brasileiro, categorias VARIADAS e CRIATIVAS.\nResponda SOMENTE JSON válido, sem markdown:\n[{"category":"...","words":["A","B"],"hint":"Dica curta de como falar sem entregar a palavra"},...]';
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] }),
  });
  const data = await res.json();
  const text = (data.content || []).find(b => b.type === 'text')?.text || '[]';
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

// ── IMPOSTOR GAME ─────────────────────────────────────
function ImpostorGame({ numPlayers, onBack }) {
  const IP = { IDLE:'idle', MODE:'mode', CATEGORY:'cat', REVEAL:'reveal', SHOWN:'shown', DONE:'done' };
  const [mode, setMode] = useState(null);
  const [round, setRound] = useState(null);
  const [cur, setCur] = useState(0);
  const [phase, setPhase] = useState(IP.IDLE);
  const [countdown, setCountdown] = useState(null);
  const [totalCD, setTotalCD] = useState(4);
  const [loading, setLoading] = useState(false);
  const deckRef = useRef(shuffle(BASE_PAIRS));
  const usedRef = useRef([]);
  const roundNumRef = useRef(0);
  const prefRef = useRef(false);

  const maybePrefetch = async () => {
    if (prefRef.current || deckRef.current.length >= 8) return;
    prefRef.current = true;
    try {
      const keys = usedRef.current.map(p => p.words[0] + '/' + p.words[1]);
      const fresh = await generateImpostorPairs(keys);
      const existing = new Set([...deckRef.current, ...usedRef.current].map(p => p.words[0] + '/' + p.words[1]));
      deckRef.current = [...deckRef.current, ...shuffle(fresh.filter(p => !existing.has(p.words[0] + '/' + p.words[1])))];
    } catch(e) {}
    prefRef.current = false;
  };

  const pickNext = () => {
    if (deckRef.current.length === 0) {
      const recycle = usedRef.current.splice(0, Math.max(0, usedRef.current.length - 20));
      deckRef.current = shuffle(recycle);
    }
    const entry = deckRef.current.shift();
    usedRef.current.push(entry);
    if (usedRef.current.length > 20) usedRef.current.shift();
    return entry;
  };

  const buildRound = (m) => {
    const entry = pickNext();
    const [a, b] = entry.words;
    const [majority, minority] = Math.random() < 0.5 ? [a, b] : [b, a];
    const impostorIdx = Math.floor(Math.random() * numPlayers);
    const speakerIdx = Math.floor(Math.random() * numPlayers);
    let words = Array(numPlayers).fill(majority);
    if (m === 'classic') words[impostorIdx] = minority;
    else words[impostorIdx] = '__IMPOSTOR__';
    roundNumRef.current += 1;
    return { words, category: entry.category, hint: entry.hint, impostorIdx, speakerIdx };
  };

  const startGame = async () => {
    setLoading(true);
    if (deckRef.current.length < 3) {
      try {
        const keys = usedRef.current.map(p => p.words[0] + '/' + p.words[1]);
        const fresh = await generateImpostorPairs(keys);
        const existing = new Set([...deckRef.current, ...usedRef.current].map(p => p.words[0] + '/' + p.words[1]));
        deckRef.current = [...deckRef.current, ...shuffle(fresh.filter(p => !existing.has(p.words[0] + '/' + p.words[1])))];
      } catch(e) {}
    }
    setRound(buildRound(mode));
    setCur(0); setPhase(IP.CATEGORY); setLoading(false);
    maybePrefetch();
  };

  const showWord = () => {
    const imp = round?.words[cur] === '__IMPOSTOR__';
    const first = round?.speakerIdx === cur;
    const secs = imp ? (first ? 7 : 5) : 4;
    setTotalCD(secs); setCountdown(secs); setPhase(IP.SHOWN);
  };

  useEffect(() => {
    if (phase !== IP.SHOWN || countdown === null) return;
    if (countdown <= 0) {
      if (cur < numPlayers - 1) { setCur(p => p + 1); setPhase(IP.REVEAL); setCountdown(null); }
      else { setPhase(IP.DONE); setCountdown(null); }
      return;
    }
    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, countdown, cur]);

  const resetGame = () => { setRound(null); setMode(null); setCur(0); setPhase(IP.IDLE); setCountdown(null); };
  const isImp = round?.words[cur] === '__IMPOSTOR__';
  const showHint = isImp && round?.speakerIdx === cur;

  const e = React.createElement;

  if (phase === IP.IDLE) return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e('div', { style: sh.gameHeader },
        e('button', { style: sh.backBtn, onClick: onBack }, '← Hub'),
        e('div', { style: sh.gameTitleSmall }, 'impostor', e('span', { style: sh.gameTitleDot }, '.'))
      ),
      e('p', { style: sh.eyebrow }, numPlayers + ' jogadores · 1 impostor'),
      e('p', { style: sh.eyebrow }, 'Escolha o modo'),
      e('div', { style: sh.modeGrid },
        e('button', { style: sh.modeCard, onClick: () => { setMode('classic'); setPhase(IP.MODE); } },
          e('span', { style: sh.modeEmoji }, '🃏'),
          e('span', { style: sh.modeName }, 'Clássico'),
          e('span', { style: sh.modeDesc }, 'Todos recebem uma palavra — o impostor recebe a diferente')
        ),
        e('button', { style: sh.modeCard, onClick: () => { setMode('blind'); setPhase(IP.MODE); } },
          e('span', { style: sh.modeEmoji }, '🕵️'),
          e('span', { style: sh.modeName }, 'Impostor Cego'),
          e('span', { style: sh.modeDesc }, 'O impostor sabe que é o impostor, mas não sabe a palavra')
        )
      )
    )
  );

  if (phase === IP.MODE) return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e('div', { style: sh.gameHeader },
        e('button', { style: sh.backBtn, onClick: resetGame }, '← Voltar')
      ),
      e('div', { style: { fontSize: 56 } }, mode === 'classic' ? '🃏' : '🕵️'),
      e('p', { style: sh.modeConfirmName }, 'Modo ' + (mode === 'classic' ? 'Clássico' : 'Impostor Cego')),
      e('p', { style: sh.instruction },
        mode === 'classic'
          ? 'Todos recebem uma palavra — mas um deles recebe a diferente. Descubram quem é o impostor!'
          : (numPlayers - 1) + ' jogadores recebem a mesma palavra. O restante sabe que é o impostor, mas não sabe a palavra!'
      ),
      loading
        ? e('div', { style: sh.loadingBox }, e('span', { style: sh.loadingDot }), e('span', { style: sh.loadingText }, 'Gerando palavras...'))
        : e(Btn, { onClick: startGame }, 'Iniciar jogo')
    )
  );

  if (phase === IP.CATEGORY && round) return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e('div', { style: sh.roundBadge }, 'Rodada ' + roundNumRef.current),
      e('p', { style: sh.eyebrow }, 'Tema da rodada'),
      e('div', { style: sh.categoryBox },
        e('span', { style: { fontSize: 48 } }, CAT_ICONS[round.category] || '🎯'),
        e('span', { style: sh.categoryText }, round.category)
      ),
      e('p', { style: sh.instruction }, 'Todos podem ver o tema — mas um de vocês é o impostor!'),
      e(Btn, { onClick: () => setPhase(IP.REVEAL) }, 'Começar revelação')
    )
  );

  if (phase === IP.REVEAL) return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e(Tag, null, playerLabel(cur)),
      e('div', { style: sh.themePill },
        e('span', null, CAT_ICONS[round.category] || '🎯'),
        e('span', { style: sh.themePillText }, round.category)
      ),
      e('p', { style: sh.instruction }, 'Segure o celular sozinho e toque para ver sua informação'),
      e('button', { style: sh.bigBtn, onClick: showWord }, 'Ver palavra')
    )
  );

  if (phase === IP.SHOWN) return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e(Tag, null, playerLabel(cur)),
      isImp
        ? e('div', { style: sh.impostorBox },
            e('span', { style: { fontSize: 32 } }, '🕵️'),
            e('span', { style: sh.impostorLabel }, 'Você é o'),
            e('span', { style: sh.impostorWord }, 'IMPOSTOR'),
            showHint
              ? e('div', { style: sh.hintBox },
                  e('span', { style: sh.hintLabel }, '💡 Dica para começar'),
                  e('span', { style: sh.hintText }, round.hint)
                )
              : e('span', { style: sh.impostorSubhint }, 'Finja que sabe e não seja pego!')
          )
        : e('div', { style: sh.wordBox }, e('span', { style: sh.wordText }, round.words[cur])),
      e(CountdownRing, { countdown, total: totalCD, color: isImp ? '#7c3f3f' : '#e8e2d9' }),
      e('p', { style: sh.hint }, isImp ? 'Memorize. Ninguém pode saber.' : 'A palavra desaparecerá em breve')
    )
  );

  if (phase === IP.DONE) return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e('div', { style: sh.gameTitleSmall }, 'impostor', e('span', { style: sh.gameTitleDot }, '.')),
      e('div', { style: sh.themePill },
        e('span', null, CAT_ICONS[round.category] || '🎯'),
        e('span', { style: sh.themePillText }, round.category)
      ),
      e('div', { style: sh.speakerBox },
        e('p', { style: sh.speakerEyebrow }, 'Começa falando'),
        e('p', { style: sh.speakerName }, playerLabel(round.speakerIdx)),
        e('p', { style: sh.speakerSub }, 'Os outros podem falar em qualquer ordem depois')
      ),
      e(Btn, { onClick: () => { setRound(null); setCur(0); setPhase(IP.MODE); } }, 'Jogar novamente'),
      e(Btn, { ghost: true, onClick: onBack }, 'Menu do hub')
    )
  );

  return null;
}

// ── JOGO DA IDADE ─────────────────────────────────────
function AgeGame({ numPlayers, onBack }) {
  const AP = { IDLE:'idle', REVEAL:'reveal', SHOWN:'shown', DONE:'done' };
  const [phase, setPhase] = useState(AP.IDLE);
  const [ages, setAges] = useState([]);
  const [cur, setCur] = useState(0);
  const [countdown, setCountdown] = useState(null);

  const generateAges = () => {
    const pool = [];
    while (pool.length < numPlayers) {
      const age = Math.floor(Math.random() * 95) + 5;
      if (!pool.includes(age)) pool.push(age);
    }
    return pool;
  };

function ScoreWheel({ onDone }) {
  const [spinning, setSpinning] = useState(false);
  const [angle, setAngle] = useState(0);
  const [result, setResult] = useState(null);
  const [visible, setVisible] = useState(false);
  const [countdown, setCountdown] = useState(null);
  const rafRef = useRef(null);
  const startAngleRef = useRef(0);
  const startTimeRef = useRef(null);
  const targetAngleRef = useRef(0);
  const durationRef = useRef(0);
  const e = React.createElement;

  const SEGMENTS = 11; // 0..10
  const SEG_DEG = 360 / SEGMENTS;

  const spin = () => {
    if (spinning || result !== null) return;
    const score = Math.floor(Math.random() * 11);
    // Segment i is drawn starting at i*SEG_DEG from top.
    // Center of segment 'score' is at: score*SEG_DEG + SEG_DEG/2 (in wheel local coords, from top)
    // To put that center under the top pointer, we rotate the wheel by -(center angle).
    // normalizedTarget is the final CSS rotation angle (mod 360) we want.
    const segCenter = score * SEG_DEG + SEG_DEG / 2;
    const normalizedTarget = ((360 - segCenter) % 360);
    const currentMod = ((angle % 360) + 360) % 360;
    const diff = ((normalizedTarget - currentMod) + 360) % 360;
    const fullSpins = (5 + Math.floor(Math.random() * 3)) * 360;
    const target = angle + fullSpins + diff;
    startAngleRef.current = angle;
    targetAngleRef.current = target;
    durationRef.current = 2200;
    startTimeRef.current = null;
    setSpinning(true);

    const animate = (ts) => {
      if (!startTimeRef.current) startTimeRef.current = ts;
      const elapsed = ts - startTimeRef.current;
      const progress = Math.min(elapsed / durationRef.current, 1);
      // ease out cubic
      const eased = 1 - Math.pow(1 - progress, 3);
      const cur = startAngleRef.current + (targetAngleRef.current - startAngleRef.current) * eased;
      setAngle(cur);
      if (progress < 1) {
        rafRef.current = requestAnimationFrame(animate);
      } else {
        setAngle(targetAngleRef.current);
        setSpinning(false);
        setResult(score);
        setVisible(true);
        setCountdown(4);
      }
    };
    rafRef.current = requestAnimationFrame(animate);
  };

  useEffect(() => {
    if (countdown === null || !visible) return;
    if (countdown <= 0) { setVisible(false); setTimeout(() => onDone(result), 300); return; }
    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [countdown, visible]);

  useEffect(() => () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); }, []);

  const cx = 140, cy = 140, r = 120;
  const colors = ['#1a0a0a','#1a1008','#0a1a08','#081018','#160818','#0a0a18','#180808','#081808','#181008','#080818','#0a1810'];
  const textColors = ['#e05555','#c9903a','#4aaa4a','#4a9fd4','#a04ad4','#4a6ad4','#e05555','#4aaa4a','#c9903a','#a04ad4','#c9a96e'];

  const segments = Array.from({ length: SEGMENTS }, (_, i) => {
    const startDeg = i * SEG_DEG;
    const endDeg = startDeg + SEG_DEG;
    const startRad = (startDeg - 90) * Math.PI / 180;
    const endRad = (endDeg - 90) * Math.PI / 180;
    const x1 = cx + r * Math.cos(startRad);
    const y1 = cy + r * Math.sin(startRad);
    const x2 = cx + r * Math.cos(endRad);
    const y2 = cy + r * Math.sin(endRad);
    const midRad = ((startDeg + endDeg) / 2 - 90) * Math.PI / 180;
    const tx = cx + (r * 0.68) * Math.cos(midRad);
    const ty = cy + (r * 0.68) * Math.sin(midRad);
    const d = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`;
    return { i, d, tx, ty };
  });

  const sd = result !== null ? SCORE_DESCS[result] : null;

  return e('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 20, width: '100%' } },
    // Wheel container
    e('div', { style: { position: 'relative', width: 280, height: 280 } },
      // Pointer
      e('div', { style: {
        position: 'absolute', top: -6, left: '50%', transform: 'translateX(-50%)',
        width: 0, height: 0,
        borderLeft: '10px solid transparent', borderRight: '10px solid transparent',
        borderTop: '20px solid #e8e2d9', zIndex: 10,
      }}),
      // SVG wheel
      e('svg', { width: 280, height: 280, viewBox: '0 0 280 280', style: { transform: 'rotate(' + angle + 'deg)', transition: spinning ? 'none' : 'none', display: 'block' } },
        // Segments
        ...segments.map(seg =>
          e('g', { key: seg.i },
            e('path', { d: seg.d, fill: colors[seg.i], stroke: '#0a0a0a', strokeWidth: 2 }),
            e('text', { x: seg.tx, y: seg.ty, textAnchor: 'middle', dominantBaseline: 'middle',
              fill: textColors[seg.i], fontSize: 16, fontWeight: 600,
              fontFamily: "'DM Serif Display',Georgia,serif" }, seg.i)
          )
        ),
        // Center circle
        e('circle', { cx, cy, r: 18, fill: '#0a0a0a', stroke: '#222', strokeWidth: 2 }),
      ),
    ),

    // Spin button or result
    result === null
      ? e('button', {
          style: { ...sh.bigBtn, opacity: spinning ? 0.5 : 1, minWidth: 180 },
          onClick: spin, disabled: spinning
        }, spinning ? 'Girando...' : '🎰 Girar roleta')
      : visible
        ? e('div', { style: { background: '#111', border: '1px solid #222', borderRadius: 6, padding: '20px 28px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, width: '100%', boxSizing: 'border-box' } },
            e('span', { style: { fontSize: 32 } }, sd.emoji),
            e('span', { style: { color: '#555', fontSize: 10, letterSpacing: '3px', textTransform: 'uppercase' } }, 'sua nota é'),
            e('span', { style: { color: '#e8e2d9', fontSize: 56, fontWeight: 300, fontFamily: "'DM Serif Display',Georgia,serif", lineHeight: 1 } }, result),
            e('span', { style: { color: textColors[result], fontSize: 13, letterSpacing: '1px', textTransform: 'uppercase', fontWeight: 500 } }, sd.label),
            e('span', { style: { color: '#555', fontSize: 12, textAlign: 'center', lineHeight: '1.6' } }, sd.desc),
            e(CountdownRing, { countdown, total: 4, color: textColors[result] }),
            e('p', { style: sh.hint }, 'A nota desaparecerá em breve')
          )
        : null
  );
}

async function generateMimicaWords(temas, usedWords) {
  const temasStr = temas.join(', ');
  const usedStr = usedWords.length > 0 ? 'Palavras já usadas (não repita): ' + usedWords.slice(-30).join(', ') + '.' : '';
  const prompt = `Você é um gerador de palavras para o jogo Mímica.\nTemas escolhidos: ${temasStr}.\n${usedStr}\nGere EXATAMENTE 20 palavras em português brasileiro, misturando os temas proporcionalmente.\nCada palavra deve ser concreta e fácil de mimar.\nResponda SOMENTE um array JSON válido sem markdown: ["palavra1","palavra2",...]`;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 500, messages: [{ role: 'user', content: prompt }] }),
  });
  const data = await res.json();
  const text = (data.content || []).find(b => b.type === 'text')?.text || '[]';
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

function MimicaGame({ numPlayers, onBack }) {
  const e = React.createElement;
  const orangeBg = 'radial-gradient(ellipse 80% 60% at 50% 0%, rgba(224,112,64,0.07) 0%, transparent 70%)';
  const P = { CONFIG:'config', TEMAS:'temas', MODE:'mode', SETUP_TEAMS:'setup_teams', ROUND_START:'round_start', MIMING:'miming', ROUND_END:'round_end', GAME_END:'game_end' };
  const [phase, setPhase] = useState(P.CONFIG);
  const [selectedTemas, setSelectedTemas] = useState(['Filmes','Cultura Pop','Ações Absurdas']);
  const [gameMode, setGameMode] = useState(null); // 'unlimited' | 'race'
  const [roundTime, setRoundTime] = useState(60);
  const [targetScore, setTargetScore] = useState(10);
  const [raceCount, setRaceCount] = useState(3);
  const [teams, setTeams] = useState([]);
  const [currentTeam, setCurrentTeam] = useState(0);
  const [scores, setScores] = useState([0, 0]);
  const [roundNum, setRoundNum] = useState(1);
  const [deck, setDeck] = useState([]);
  const [usedWords, setUsedWords] = useState([]);
  const [currentWord, setCurrentWord] = useState('');
  const [countdown, setCountdown] = useState(null);
  const [hits, setHits] = useState(0);
  const [loading, setLoading] = useState(false);
  const [isMimico, setIsMimico] = useState(false);
  const [mimicoIdx, setMimicoIdx] = useState(0);
  const timerRef = useRef(null);

  const teamColors = ['#e07040','#4a9fd4'];
  const teamNames = ['Time A', 'Time B'];

  const buildDeck = () => {
    let pool = [];
    selectedTemas.forEach(t => { if (MIMICA_BASE[t]) pool = [...pool, ...MIMICA_BASE[t]]; });
    return shuffle(pool.filter(w => !usedWords.includes(w)));
  };

  const startDeck = async () => {
    setLoading(true);
    try {
      const ai = await generateMimicaWords(selectedTemas, usedWords);
      const base = buildDeck();
      const combined = shuffle([...base, ...ai.filter(w => !usedWords.includes(w))]);
      setDeck(combined);
      setLoading(false);
      return combined;
    } catch(ex) {
      const base = buildDeck();
      setDeck(base);
      setLoading(false);
      return base;
    }
  };

  const setupTeams = () => {
    const names = Array.from({length: numPlayers}, (_, i) => 'Jogador ' + (i + 1));
    const shuffled = shuffle(names);
    const half = Math.ceil(shuffled.length / 2);
    setTeams([shuffled.slice(0, half), shuffled.slice(half)]);
    setScores([0, 0]);
    setCurrentTeam(0);
    setMimicoIdx(0);
    setRoundNum(1);
  };

  const startRound = async (d) => {
    const activeDeck = d || deck;
    if (activeDeck.length === 0) {
      const newDeck = await startDeck();
      setCurrentWord(newDeck[0]);
      setDeck(newDeck.slice(1));
    } else {
      setCurrentWord(activeDeck[0]);
      setDeck(activeDeck.slice(1));
    }
    setHits(0);
    setCountdown(roundTime);
    setPhase(P.MIMING);
  };

  useEffect(() => {
    if (phase !== P.MIMING || countdown === null) return;
    if (countdown <= 0) { clearInterval(timerRef.current); endRound(); return; }
    timerRef.current = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(timerRef.current);
  }, [phase, countdown]);

  const nextWord = () => {
    const newHits = hits + 1;
    setHits(newHits);
    setUsedWords(u => [...u, currentWord]);
    if (gameMode === 'race' && newHits >= raceCount) { endRound(newHits); return; }
    if (deck.length > 0) { setCurrentWord(deck[0]); setDeck(d => d.slice(1)); }
    else { endRound(newHits); }
  };

  const endRound = (finalHits) => {
    clearTimeout(timerRef.current);
    const h = finalHits !== undefined ? finalHits : hits;
    const newScores = [...scores];
    newScores[currentTeam] += h;
    setScores(newScores);
    setPhase(P.ROUND_END);
    const winner = newScores.findIndex(s => s >= targetScore);
    if (winner >= 0) setTimeout(() => setPhase(P.GAME_END), 100);
  };

  const nextRound = () => {
    const nextTeam = (currentTeam + 1) % 2;
    setCurrentTeam(nextTeam);
    setMimicoIdx(m => (m + 1) % (teams[nextTeam]?.length || 1));
    setRoundNum(r => r + 1);
    setPhase(P.ROUND_START);
  };

  if (phase === P.CONFIG) return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: orangeBg } }),
    e(Screen, null,
      e('div', { style: sh.gameHeader }, e('button', { style: sh.backBtn, onClick: onBack }, '← Hub')),

// ── QUEM SOU EU ───────────────────────────────────────
const QUEMSOUEU_CATS = ['Celebridades', 'Personagens de Desenho', 'Figuras Históricas', 'Heróis e Vilões', 'Personagens de Filme', 'Animais Famosos'];

async function generateIdentities(categories, numPlayers, usedNames) {
  const catsStr = categories.join(', ');
  const usedStr = usedNames.length > 0 ? 'Não repita: ' + usedNames.join(', ') + '.' : '';
  const prompt = `Você é um gerador de identidades para o jogo "Quem Sou Eu?"\nCategorias: ${catsStr}.\n${usedStr}\nGere EXATAMENTE ${numPlayers} identidades únicas e bem conhecidas em português brasileiro.\nResponda SOMENTE um array JSON: ["Nome1","Nome2",...]`;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 300, messages: [{ role: 'user', content: prompt }] }),
  });
  const data = await res.json();
  const text = (data.content || []).find(b => b.type === 'text')?.text || '[]';
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

function QuemSouEuGame({ numPlayers, onBack }) {
  const e = React.createElement;
  const purpleBg = 'radial-gradient(ellipse 80% 60% at 50% 0%, rgba(160,112,224,0.07) 0%, transparent 70%)';
  const P = { CAT:'cat', LOADING:'loading', REVEAL:'reveal', SHOWN:'shown', PLAYING:'playing', GUESS:'guess', END:'end' };
  const [phase, setPhase] = useState(P.CAT);
  const [selectedCats, setSelectedCats] = useState(['Celebridades','Personagens de Desenho']);
  const [identities, setIdentities] = useState([]);
  const [cur, setCur] = useState(0);
  const [guessInput, setGuessInput] = useState('');
  const [eliminated, setEliminated] = useState([]);
  const [activePlayer, setActivePlayer] = useState(0);
  const [canContinue, setCanContinue] = useState(false);
  const [loading, setLoading] = useState(false);
  const [countdown, setCountdown] = useState(null);
  const usedRef = useRef([]);

  const startGame = async () => {
    setLoading(true); setPhase(P.LOADING);
    try {
      const ids = await generateIdentities(selectedCats, numPlayers, usedRef.current);
      usedRef.current = [...usedRef.current, ...ids];
      setIdentities(ids);
      setEliminated([]);
      setActivePlayer(0);
      setCur(0);
      setLoading(false);
      setPhase(P.REVEAL);
    } catch(ex) {
      setLoading(false); setPhase(P.CAT);
    }
  };

  const showIdentity = () => { setCountdown(5); setPhase(P.SHOWN); };

  useEffect(() => {
    if (phase !== P.SHOWN || countdown === null) return;
    if (countdown <= 0) {
      if (cur < numPlayers - 1) { setCur(c => c + 1); setPhase(P.REVEAL); setCountdown(null); }
      else { setActivePlayer(0); setPhase(P.PLAYING); setCountdown(null); }
      return;
    }
    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, countdown, cur]);

  const handleAnswer = (isYes) => {
    if (isYes) { setCanContinue(false); }
    else { advanceTurn(); }
  };

  const advanceTurn = () => {
    setCanContinue(false);
    const remaining = Array.from({length: numPlayers}, (_, i) => i).filter(i => !eliminated.includes(i));
    const currentPos = remaining.indexOf(activePlayer);
    const nextPos = (currentPos + 1) % remaining.length;
    setActivePlayer(remaining[nextPos]);
  };

  const handleGuess = (correct) => {
    if (correct) {
      const newElim = [...eliminated, activePlayer];
      setEliminated(newElim);
      if (newElim.length >= numPlayers) { setPhase(P.END); return; }
      const remaining = Array.from({length: numPlayers}, (_, i) => i).filter(i => !newElim.includes(i));
      setActivePlayer(remaining[0]);
    }
    setGuessInput('');
    setPhase(P.PLAYING);
  };

  const getOtherIdentities = (myIdx) =>
    identities.map((id, i) => ({ name: 'Jogador ' + (i + 1), identity: id, isSelf: i === myIdx }));

  if (phase === P.CAT) return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: purpleBg } }),
    e(Screen, null,
      e('div', { style: sh.gameHeader }, e('button', { style: sh.backBtn, onClick: onBack }, '← Hub')),
      e('p', { style: sh.eyebrow }, 'Categorias'),
      e('div', { style: { ...sh.gameTitleSmall, justifyContent: 'center' } }, 'Quem Sou Eu', e('span', { style: { ...sh.gameTitleDot, color: '#a070e0' } }, '?')),
      e('div', { style: { width: '100%', display: 'flex', flexDirection: 'column', gap: 10 } },
        ...QUEMSOUEU_CATS.map(c => {
          const sel = selectedCats.includes(c);
          return e('button', { key: c, onClick: () => setSelectedCats(prev => sel ? prev.filter(x=>x!==c) : [...prev,c]),
            style: { display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px',
              border: sel ? '1px solid #a070e0' : '1px solid #1e1e1e',
              background: sel ? '#110a1a' : '#111', borderRadius: 4, cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left' } },
            e('span', { style: { width: 18, height: 18, borderRadius: 3, border: sel ? '2px solid #a070e0' : '2px solid #333',
              background: sel ? '#a070e0' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 } },
              sel ? e('span', { style: { color: '#fff', fontSize: 11, fontWeight: 700 } }, '✓') : null),
            e('span', { style: { color: sel ? '#d0b0f0' : '#666', fontSize: 14 } }, c)
          );
        })
      ),
      e(Btn, { onClick: startGame, disabled: selectedCats.length === 0, style: { background: '#a070e0', color: '#fff' } }, 'Gerar identidades →')
    )
  );

  if (phase === P.LOADING) return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: purpleBg } }),
    e(Screen, null,
      e('div', { style: sh.loadingBox },
        e('span', { style: { ...sh.loadingDot, background: '#a070e0' } }),
        e('span', { style: sh.loadingText }, 'Gerando identidades...')
      )
    )
  );

  if (phase === P.REVEAL) return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: purpleBg } }),
    e(Screen, null,
      e(Tag, { color: '#a070e0' }, 'Jogador ' + (cur + 1)),
      e('p', { style: sh.instruction }, 'Passe o celular para o grupo ver, menos ' + ('Jogador ' + (cur + 1)) + '.\nTodos memorizam o personagem e devolvem.'),
      e('div', { style: { ...sh.wordBox, background: '#110a1a', borderColor: '#2a1a4a' } },
        e('span', { style: { ...sh.wordText, color: '#d0b0f0' } }, identities[cur] || '...')
      ),
      e(Btn, { onClick: showIdentity, style: { background: '#a070e0', color: '#fff' } }, 'Devolveram → Mostrar')
    )
  );

  if (phase === P.SHOWN) return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: purpleBg } }),
    e(Screen, null,
      e(Tag, { color: '#a070e0' }, 'Jogador ' + (cur + 1)),
      e('div', { style: { ...sh.wordBox, background: '#110a1a', borderColor: '#2a1a4a', flexDirection: 'column', gap: 6 } },
        e('p', { style: { color: '#6a408a', fontSize: 11, letterSpacing: '3px', textTransform: 'uppercase' } }, 'Sua identidade está oculta'),
        e('p', { style: { color: '#8a608a', fontSize: 13, textAlign: 'center', lineHeight: '1.6' } }, 'Faça perguntas de Sim ou Não para descobrir quem você é!')
      ),
      e(CountdownRing, { countdown, total: 5, color: '#a070e0' }),
      e('p', { style: sh.hint }, cur < numPlayers - 1 ? 'Passando para o próximo...' : 'Iniciando o jogo...')
    )
  );

  if (phase === P.PLAYING) {
    const remaining = Array.from({length: numPlayers}, (_, i) => i).filter(i => !eliminated.includes(i));
    const myId = activePlayer;
    return e('div', { style: sh.gameRoot },
      e('div', { style: { ...sh.bg, background: purpleBg } }),
      e(Screen, null,
        e('div', { style: sh.roundBadge }, remaining.length + ' restante' + (remaining.length !== 1 ? 's' : '')),
        e('div', { style: { ...sh.speakerBox, background: '#110a1a', borderColor: '#2a1a4a' } },
          e('p', { style: { ...sh.speakerEyebrow, color: '#6a408a' } }, 'Vez de jogar'),
          e('p', { style: { ...sh.speakerName, color: '#d0b0f0' } }, 'Jogador ' + (myId + 1)),
          e('p', { style: sh.speakerSub }, 'Faça uma pergunta de Sim ou Não')
        ),
        e('p', { style: { color: '#444', fontSize: 13, textAlign: 'center' } }, 'O grupo responde em voz alta'),
        e('div', { style: { display: 'flex', gap: 10, width: '100%' } },
          e('button', { onClick: () => handleAnswer(false),
            style: { flex: 1, padding: '14px', border: '1px solid #3a1a1a', background: '#1a0a0a', color: '#e05555', borderRadius: 4, fontSize: 18, cursor: 'pointer' } }, '✗ Não'),
          e('button', { onClick: () => { setCanContinue(true); },
            style: { flex: 1, padding: '14px', border: '1px solid #1a3a1a', background: '#0a1a0a', color: '#4ab84a', borderRadius: 4, fontSize: 18, cursor: 'pointer' } }, '✓ Sim')
        ),
        canContinue ? e('div', { style: { display: 'flex', gap: 10, width: '100%', flexDirection: 'column' } },
          e('p', { style: { color: '#555', fontSize: 12, textAlign: 'center', letterSpacing: '1px' } }, 'Jogador ' + (myId + 1) + ', o que quer fazer?'),
          e('div', { style: { display: 'flex', gap: 10, width: '100%' } },
            e(Btn, { ghost: true, onClick: advanceTurn, style: { flex: 1 } }, 'Passar vez'),
            e(Btn, { onClick: () => setPhase(P.GUESS), style: { flex: 1, background: '#a070e0', color: '#fff' } }, '🎯 Dar palpite')
          )
        ) : null
      )
    );
  }

  if (phase === P.GUESS) return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: purpleBg } }),
    e(Screen, null,
      e(Tag, { color: '#a070e0' }, 'Jogador ' + (activePlayer + 1)),
      e('p', { style: sh.instruction }, 'Dê o seu palpite! Quem você acha que é?'),
      e('input', {
        type: 'text', placeholder: 'Escreva o palpite...',
        value: guessInput, onChange: ev => setGuessInput(ev.target.value),
        style: { ...inputStyle }
      }),
      e('p', { style: { color: '#555', fontSize: 13, textAlign: 'center' } }, 'O grupo valida se acertou'),
      e('div', { style: { display: 'flex', gap: 10, width: '100%' } },
        e('button', { onClick: () => handleGuess(false),
          style: { flex: 1, padding: '14px', border: '1px solid #3a1a1a', background: '#1a0a0a', color: '#e05555', borderRadius: 4, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit', letterSpacing: '1px', textTransform: 'uppercase' } }, 'Errou'),
        e('button', { onClick: () => handleGuess(true),

      ),
      e(Btn, { ghost: true, onClick: () => { setGuessInput(''); setPhase(P.PLAYING); } }, 'Cancelar')
    )
  );

  if (phase === P.END) return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: purpleBg } }),
    e(Screen, null,
      e('div', { style: { ...sh.gameTitleSmall, justifyContent: 'center' } }, 'Quem Sou Eu', e('span', { style: { ...sh.gameTitleDot, color: '#a070e0' } }, '?')),

        e('div', { style: { padding: '12px 16px', borderBottom: '1px solid #1a1a1a' } },
          e('span', { style: { color: '#444', fontSize: 10, letterSpacing: '2px', textTransform: 'uppercase' } }, 'Identidades da rodada')
        ),
        ...identities.map((id, i) => e('div', { key: i, style: { display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px', borderBottom: i < identities.length - 1 ? '1px solid #111' : 'none' } },

          e('span', { style: { color: '#e8e2d9', fontSize: 13, flex: 1 } }, id)
        ))
      ),
      e(Btn, { onClick: () => { setPhase(P.CAT); setIdentities([]); setEliminated([]); }, style: { background: '#a070e0', color: '#fff' } }, 'Jogar novamente'),

const DESTINO_TEMAS = ['Cidades do Mundo', 'Filmes', 'Comidas', 'Animais', 'Países', 'Celebridades', 'Objetos Curiosos', 'Personagens'];

async function generateDestinoHints(word, theme) {
  const prompt = `Você é um gerador de dicas para o jogo "O Próximo Destino" para casais.\nPalavra secreta: "${word}"\nTema: ${theme}\n\nGere EXATAMENTE 5 dicas em ordem da MAIS DIFÍCIL para a MAIS FÁCIL.\nDica 1: muito vaga e poética (quase impossível adivinhar)\nDica 2: um pouco mais específica\nDica 3: moderada\nDica 4: bem sugestiva\nDica 5: quase entrega a resposta\n\nResponda SOMENTE JSON: {"dicas":["dica1","dica2","dica3","dica4","dica5"]}`;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 400, messages: [{ role: 'user', content: prompt }] }),
  });
  const data = await res.json();
  const text = (data.content || []).find(b => b.type === 'text')?.text || '{}';
  const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
  return parsed.dicas || [];
}

async function generateDestinoWord(theme) {
  const prompt = `Você é um gerador de palavras para o jogo "O Próximo Destino".\nTema: ${theme}\nGere UMA palavra/nome criativo e interessante para o tema, em português.\nResponda SOMENTE o nome, sem explicação.`;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 50, messages: [{ role: 'user', content: prompt }] }),
  });
  const data = await res.json();
  return ((data.content || []).find(b => b.type === 'text')?.text || '').trim();
}

function DestinoGame({ numPlayers, onBack }) {
  const e = React.createElement;
  const roseBg = 'radial-gradient(ellipse 80% 60% at 50% 0%, rgba(224,96,128,0.07) 0%, transparent 70%)';
  const P = { MODE:'mode', SETUP:'setup', HINTS_SETUP:'hints_setup', WAIT:'wait', PLAYING:'playing', GUESSED:'guessed', REVEAL:'reveal', END:'end' };
  const [phase, setPhase] = useState(P.MODE);
  const [gameMode, setGameMode] = useState(null); // 'ai' | 'human'
  const [selectedTheme, setSelectedTheme] = useState('Cidades do Mundo');
  const [secretWord, setSecretWord] = useState('');
  const [wordInput, setWordInput] = useState('');
  const [hints, setHints] = useState([]);
  const [customHints, setCustomHints] = useState(['','','','','']);
  const [currentHint, setCurrentHint] = useState(0);
  const [scores, setScores] = useState([0, 0]);
  const [currentPlayer, setCurrentPlayer] = useState(0); // 0 = player 1, 1 = player 2
  const [playerNames] = useState(['Jogador 1', 'Jogador 2']);
  const [guessInput, setGuessInput] = useState('');
  const [p1done, setP1done] = useState(false);
  const [p2done, setP2done] = useState(false);
  const [roundWinner, setRoundWinner] = useState(null);
  const [loading, setLoading] = useState(false);
  const [hintMode, setHintMode] = useState('ai'); // for human mode: 'ai' | 'manual'
  const [roundNum, setRoundNum] = useState(1);

  const pointsForHint = (h) => Math.max(1, 5 - h);

  const startAIMode = async () => {
    setLoading(true);
    try {
      const word = await generateDestinoWord(selectedTheme);
      setSecretWord(word);
      const h = await generateDestinoHints(word, selectedTheme);
      setHints(h);
      setCurrentHint(0); setP1done(false); setP2done(false); setCurrentPlayer(0); setGuessInput('');
      setLoading(false); setPhase(P.PLAYING);
    } catch(ex) { setLoading(false); }
  };

  const startHumanMode = async () => {
    setLoading(true);
    try {
      if (hintMode === 'ai') {
        const h = await generateDestinoHints(wordInput.trim(), selectedTheme);
        setHints(h);
      } else {
        setHints(customHints);
      }
      setSecretWord(wordInput.trim());
      setCurrentHint(0); setP1done(false); setP2done(false); setCurrentPlayer(1); setGuessInput('');
      setLoading(false); setPhase(P.PLAYING);
    } catch(ex) { setLoading(false); }
  };

  const submitGuess = (guess) => {
    const correct = guess.trim().toLowerCase() === secretWord.toLowerCase();
    if (correct) {
      const pts = pointsForHint(currentHint);
      const newScores = [...scores];
      newScores[currentPlayer] += pts;
      setScores(newScores);
      setRoundWinner(currentPlayer);
      setPhase(P.GUESSED);
      return;
    }
    // Wrong guess - mark done and advance
    if (currentPlayer === 0) { setP1done(true); setCurrentPlayer(1); }
    else { setP2done(true); advanceHint(); }
    setGuessInput('');
  };

  const passTurn = () => {
    if (currentPlayer === 0) { setP1done(true); setCurrentPlayer(1); }
    else { setP2done(true); advanceHint(); }
  };

  const advanceHint = () => {
    setP1done(false); setP2done(false); setCurrentPlayer(0);
    if (currentHint < 4) { setCurrentHint(h => h + 1); }
    else { setPhase(P.REVEAL); }
  };

  const nextRound = () => { setRoundNum(r => r + 1); setPhase(P.MODE); setRoundWinner(null); setHints([]); setSecretWord(''); setWordInput(''); setCustomHints(['','','','','']); };

  const waitScreen = (msg) => e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: roseBg } }),
    e(Screen, null,
      e('div', { style: { ...sh.wordBox, background: '#0f060a', borderColor: '#3a0a1a', flexDirection: 'column', gap: 12, padding: '40px 28px' } },
        e('span', { style: { fontSize: 36 } }, '💌'),
        e('p', { style: { color: '#c06080', fontSize: 13, textAlign: 'center', lineHeight: '1.7' } }, msg)
      )
    )
  );

  if (phase === P.MODE) return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: roseBg } }),
    e(Screen, null,
      e('div', { style: sh.gameHeader }, e('button', { style: sh.backBtn, onClick: onBack }, '← Hub')),
      e('div', { style: { ...sh.gameTitleSmall, justifyContent: 'center' } }, 'O Próximo Destino', e('span', { style: { ...sh.gameTitleDot, color: '#e06080' } }, '.')),
      e('p', { style: { color: '#555', fontSize: 11, letterSpacing: '2px', textTransform: 'uppercase', textAlign: 'center', marginBottom: 4 } }, 'Rodada ' + roundNum),
      e('div', { style: { ...sh.modeGrid, width: '100%' } },
        e('button', { style: sh.modeCard, onClick: () => setGameMode('ai') },
          e('span', { style: sh.modeEmoji }, '🤖'),
          e('span', { style: sh.modeName }, 'IA Generativa'),
          e('span', { style: sh.modeDesc }, 'A IA sorteia uma palavra e cria 5 dicas automáticas')
        ),
        e('button', { style: sh.modeCard, onClick: () => setGameMode('human') },
          e('span', { style: sh.modeEmoji }, '✍️'),
          e('span', { style: sh.modeName }, 'Criador Humano'),
          e('span', { style: sh.modeDesc }, 'Um jogador inventa a palavra secreta e escolhe as dicas')
        )
      ),
      e('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%', padding: '0 4px' } },
        ...scores.map((s, ti) => e('div', { key: ti, style: { textAlign: 'center' } },
          e('p', { style: { color: '#c06080', fontSize: 10, letterSpacing: '2px', textTransform: 'uppercase', marginBottom: 4 } }, playerNames[ti]),
          e('p', { style: { color: '#e8e2d9', fontSize: 24, fontWeight: 300, fontFamily: "'DM Serif Display',Georgia,serif" } }, s + ' pts')
        ))
      )
    )
  );

  if (gameMode === 'ai' && phase === P.MODE) return null; // handled above

  if (gameMode === 'ai' && phase !== P.MODE) {
    // Handled in the SETUP below after mode selection triggers
  }

  if (gameMode === 'ai' && !loading && hints.length === 0 && phase === P.MODE) return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: roseBg } }),
    e(Screen, null,
      e('p', { style: sh.eyebrow }, 'Tema'),
      e('div', { style: { width: '100%', display: 'flex', flexDirection: 'column', gap: 10 } },
        ...DESTINO_TEMAS.map(t => e('button', { key: t, onClick: () => setSelectedTheme(t),
          style: { padding: '12px 16px', border: selectedTheme === t ? '1px solid #e06080' : '1px solid #1e1e1e',
            background: selectedTheme === t ? '#1a060e' : '#111', borderRadius: 4, cursor: 'pointer', fontFamily: 'inherit',
            color: selectedTheme === t ? '#f0a0b8' : '#666', fontSize: 13, textAlign: 'left' } }, t))
      ),
      e(Btn, { onClick: startAIMode, style: { background: '#e06080', color: '#fff' } }, 'Gerar palavra →')
    )
  );

  if (phase === P.MODE && gameMode === 'ai') return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: roseBg } }),
    e(Screen, null,
      e('button', { style: sh.backBtn, onClick: () => setGameMode(null) }, '← Voltar'),
      e('p', { style: sh.eyebrow }, 'Escolha o tema'),
      e('div', { style: { width: '100%', display: 'flex', flexDirection: 'column', gap: 8 } },
        ...DESTINO_TEMAS.map(t => e('button', { key: t, onClick: () => setSelectedTheme(t),
          style: { padding: '12px 16px', border: selectedTheme === t ? '1px solid #e06080' : '1px solid #1e1e1e',
            background: selectedTheme === t ? '#1a060e' : '#111', borderRadius: 4, cursor: 'pointer', fontFamily: 'inherit',
            color: selectedTheme === t ? '#f0a0b8' : '#666', fontSize: 13, textAlign: 'left' } }, t))
      ),
      loading
        ? e('div', { style: sh.loadingBox }, e('span', { style: { ...sh.loadingDot, background: '#e06080' } }), e('span', { style: sh.loadingText }, 'Gerando...'))
        : e(Btn, { onClick: startAIMode, style: { background: '#e06080', color: '#fff' } }, 'Gerar palavra e dicas →')
    )
  );

  if (phase === P.MODE && gameMode === 'human') return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: roseBg } }),
    e(Screen, null,
      e('button', { style: sh.backBtn, onClick: () => setGameMode(null) }, '← Voltar'),
      e('p', { style: sh.eyebrow }, 'Criador Humano — ' + playerNames[0] + ' configura'),
      e('input', {
        type: 'text', placeholder: 'Palavra secreta...',
        value: wordInput, onChange: ev => setWordInput(ev.target.value),
        style: { ...inputStyle }
      }),
      e('p', { style: { color: '#444', fontSize: 12, letterSpacing: '2px', textTransform: 'uppercase', marginTop: 4 } }, 'Como quer as dicas?'),
      e('div', { style: { display: 'flex', gap: 8, width: '100%' } },
        ...[['ai','IA gera as dicas'],['manual','Digitar manualmente']].map(([v, label]) =>
          e('button', { key: v, onClick: () => setHintMode(v),
            style: { flex: 1, padding: '10px', border: hintMode === v ? '1px solid #e06080' : '1px solid #1e1e1e',
              background: hintMode === v ? '#1a060e' : '#111', borderRadius: 4, cursor: 'pointer', fontFamily: 'inherit',
              color: hintMode === v ? '#f0a0b8' : '#666', fontSize: 12, textAlign: 'center' } }, label)
        )
      ),
      hintMode === 'manual' ? e('div', { style: { width: '100%', display: 'flex', flexDirection: 'column', gap: 8 } },
        ...customHints.map((h, i) => e('input', {
          key: i, type: 'text', placeholder: 'Dica ' + (i+1) + (i===0?' (mais difícil)':i===4?' (mais fácil)':'') + '...',
          value: h, onChange: ev => setCustomHints(prev => { const n=[...prev]; n[i]=ev.target.value; return n; }),
          style: { ...inputStyle, fontSize: 13 }
        }))
      ) : null,
      loading
        ? e('div', { style: sh.loadingBox }, e('span', { style: { ...sh.loadingDot, background: '#e06080' } }), e('span', { style: sh.loadingText }, 'Gerando dicas...'))
        : e(Btn, {
            onClick: startHumanMode,
            disabled: !wordInput.trim() || (hintMode === 'manual' && customHints.some(h => !h.trim())),
            style: { background: '#e06080', color: '#fff' }
          }, 'Iniciar rodada →')
    )
  );

  if (phase === P.PLAYING) {
    const isP1Turn = currentPlayer === 0 && !p1done;
    const isP2Turn = currentPlayer === 1 && !p2done;
    const hint = hints[currentHint] || '...';
    const myTurn = !p1done && currentPlayer === 0 || !p2done && currentPlayer === 1;
    return e('div', { style: sh.gameRoot },
      e('div', { style: { ...sh.bg, background: roseBg } }),
      e(Screen, null,
        e('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%' } },
          e('span', { style: { color: '#e06080', fontSize: 11, letterSpacing: '2px', textTransform: 'uppercase' } }, 'Dica ' + (currentHint+1) + ' de 5'),
          e('span', { style: { color: '#444', fontSize: 11, letterSpacing: '2px', textTransform: 'uppercase' } }, pointsForHint(currentHint) + ' pts se acertar')
        ),
        e('div', { style: { ...sh.wordBox, background: '#0f060a', borderColor: '#3a0a1a', padding: '32px 24px' } },
          e('span', { style: { ...sh.wordText, color: '#f0a0b8', textAlign: 'center', lineHeight: '1.5' } }, hint)
        ),
        e('div', { style: { ...sh.speakerBox, background: '#110609', borderColor: '#2a0a14' } },
          e('p', { style: { ...sh.speakerEyebrow, color: '#8a3050' } }, 'Vez de'),
          e('p', { style: { ...sh.speakerName, color: '#f0a0b8' } }, playerNames[currentPlayer])
        ),
        e('input', {
          type: 'text', placeholder: 'Seu palpite...',
          value: guessInput, onChange: ev => setGuessInput(ev.target.value),
          onKeyDown: ev => { if (ev.key === 'Enter' && guessInput.trim()) submitGuess(guessInput); },
          style: { ...inputStyle }
        }),
        e('div', { style: { display: 'flex', gap: 10, width: '100%' } },
          e(Btn, { ghost: true, onClick: passTurn }, 'Passar vez'),
          e(Btn, { onClick: () => guessInput.trim() && submitGuess(guessInput), disabled: !guessInput.trim(), style: { background: '#e06080', color: '#fff' } }, 'Enviar →')
        )
      )
    );
  }

  if (phase === P.GUESSED) return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: roseBg } }),
    e(Screen, null,
      e('div', { style: { ...sh.wordBox, background: '#0f060a', borderColor: '#3a0a1a', flexDirection: 'column', gap: 8 } },
        e('span', { style: { fontSize: 36 } }, '🎉'),
        e('p', { style: { color: '#f0a0b8', fontSize: 16, fontWeight: 500 } }, playerNames[roundWinner] + ' acertou!'),
        e('p', { style: { color: '#e8e2d9', fontSize: 32, fontWeight: 300, fontFamily: "'DM Serif Display',Georgia,serif" } }, secretWord),
        e('p', { style: { color: '#c06080', fontSize: 13 } }, '+' + pointsForHint(currentHint) + ' pontos (Dica ' + (currentHint+1) + ')')
      ),
      e('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%', padding: '0 4px' } },
        ...scores.map((s, ti) => e('div', { key: ti, style: { textAlign: 'center' } },
          e('p', { style: { color: '#c06080', fontSize: 10, letterSpacing: '2px', textTransform: 'uppercase', marginBottom: 4 } }, playerNames[ti]),
          e('p', { style: { color: '#e8e2d9', fontSize: 24, fontWeight: 300, fontFamily: "'DM Serif Display',Georgia,serif" } }, s + ' pts')
        ))
      ),
      e(Btn, { onClick: nextRound, style: { background: '#e06080', color: '#fff' } }, 'Próxima rodada →'),
      e(Btn, { ghost: true, onClick: onBack }, 'Sair')
    )
  );

  if (phase === P.REVEAL) return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: roseBg } }),
    e(Screen, null,
      e('p', { style: sh.eyebrow }, 'Ninguém acertou!'),
      e('div', { style: { ...sh.wordBox, background: '#0f060a', borderColor: '#3a0a1a', flexDirection: 'column', gap: 8 } },
        e('p', { style: { color: '#6a3048', fontSize: 11, letterSpacing: '3px', textTransform: 'uppercase' } }, 'A resposta era'),
        e('p', { style: { color: '#f0a0b8', fontSize: 36, fontWeight: 300, fontFamily: "'DM Serif Display',Georgia,serif" } }, secretWord)
      ),
      e(Btn, { onClick: nextRound, style: { background: '#e06080', color: '#fff' } }, 'Próxima rodada →'),
      e(Btn, { ghost: true, onClick: onBack }, 'Sair')
    )
  );

  return null;
}

function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 5; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;

// ── LOBBY / ONLINE WRAPPER ─────────────────────────────

  const [screen, setScreen] = useState('home'); // home | create | join | waiting | game

  const [inputCode, setInputCode] = useState('');
  const [playerName, setPlayerName] = useState('');
  const [nameInput, setNameInput] = useState('');
  const [players, setPlayers] = useState([]);
  const [isHost, setIsHost] = useState(false);
  const [myId, setMyId] = useState(null);
  const [gameState, setGameState] = useState(null);
  const [selectedGame, setSelectedGame] = useState(null);
  const [numPlayers, setNumPlayers] = useState(null);
  const [error, setError] = useState('');
  const roomRef = useRef(null);
  const myRef = useRef(null);
  const e = React.createElement;

  useEffect(() => {
    if (!db) initFirebase();
  }, []);

  // Listen to room changes
  useEffect(() => {
    if (!roomCode || screen === 'home' || screen === 'create' || screen === 'join') return;
    const ref = firebase.database().ref('rooms/' + roomCode);
    roomRef.current = ref;
    const unsub = ref.on('value', snap => {
      const data = snap.val();
      if (!data) return;
      const plist = Object.entries(data.players || {}).map(([id, p]) => ({ id, ...p }));
      setPlayers(plist);
      if (data.gameState) setGameState(data.gameState);
    });
    return () => ref.off('value', unsub);
  }, [roomCode, screen]);

  // Cleanup on leave
  useEffect(() => {
    return () => {
      if (myRef.current) myRef.current.remove();
    };
  }, []);

  const createRoom = async () => {
    if (!nameInput.trim()) { setError('Digite seu nome'); return; }
    const code = genCode();
    const id = 'p_' + Date.now();
    const player = { name: nameInput.trim(), host: true, joined: Date.now() };
    await firebase.database().ref('rooms/' + code + '/players/' + id).set(player);
    await firebase.database().ref('rooms/' + code + '/status').set('waiting');
    myRef.current = firebase.database().ref('rooms/' + code + '/players/' + id);
    setRoomCode(code);
    setPlayerName(nameInput.trim());
    setMyId(id);
    setIsHost(true);
    setScreen('waiting');
  };

  const joinRoom = async () => {
    if (!nameInput.trim()) { setError('Digite seu nome'); return; }
    if (!inputCode.trim()) { setError('Digite o código da sala'); return; }
    const code = inputCode.trim().toUpperCase();
    const snap = await firebase.database().ref('rooms/' + code).once('value');
    if (!snap.exists()) { setError('Sala não encontrada'); return; }
    const id = 'p_' + Date.now();
    const player = { name: nameInput.trim(), host: false, joined: Date.now() };
    await firebase.database().ref('rooms/' + code + '/players/' + id).set(player);
    myRef.current = firebase.database().ref('rooms/' + code + '/players/' + id);
    setRoomCode(code);
    setPlayerName(nameInput.trim());
    setMyId(id);
    setIsHost(false);
    setScreen('waiting');
  };

  const startOnlineGame = async (gameId) => {
    // Host picks a game and writes it to Firebase — all clients navigate
    await firebase.database().ref('rooms/' + roomCode + '/gameState').set({
      game: gameId,
      startedAt: Date.now(),
      numPlayers: players.length,
    });
  };

  // When gameState arrives, navigate to game (all clients)
  useEffect(() => {
    if (gameState && gameState.game && screen === 'waiting') {
      setSelectedGame(gameState.game);
      setNumPlayers(gameState.numPlayers);
      setScreen('game');

  const leaveRoom = () => {
    if (myRef.current) myRef.current.remove();

    setRoomCode(''); setPlayers([]); setIsHost(false);
    setMyId(null); setGameState(null); setSelectedGame(null);
    setScreen('home');
  };

      }),
      e('input', {
        type: 'text', placeholder: 'Código da sala (ex: AB3X7)',
        value: inputCode, onChange: ev => { setInputCode(ev.target.value.toUpperCase()); setError(''); },
        style: { ...inputStyle, letterSpacing: 4, textTransform: 'uppercase', textAlign: 'center', fontSize: 22 }
      }),
      error ? e('p', { style: errorStyle }, error) : null,
      e(Btn, { onClick: joinRoom }, 'Entrar')
    )
  );

  // ── WAITING ROOM ──
  if (screen === 'waiting') return e('div', { style: sh.hubRoot },
    e('div', { style: sh.hubBg }),
    e('div', { style: { ...sh.hubScreen, gap: 20 } },
      e('button', { style: sh.backBtn, onClick: leaveRoom }, '← Sair da sala'),
      e('p', { style: sh.eyebrow }, 'Código da sala'),
      e('div', { style: {
        background: '#111', border: '1px solid #222', borderRadius: 8,
        padding: '20px 32px', textAlign: 'center', width: '100%'
      } },
        e('span', { style: { color: '#c9a96e', fontSize: 40, fontWeight: 700, letterSpacing: 8, fontFamily: "'DM Serif Display',Georgia,serif" } }, roomCode),
        e('p', { style: { color: '#444', fontSize: 11, letterSpacing: '2px', textTransform: 'uppercase', marginTop: 8 } }, 'Compartilhe com seus amigos')

      e('div', { style: { width: '100%' } },

          ...players.map((p, i) =>
            e('div', { key: p.id, style: {

              e('span', { style: { fontSize: 16 } }, p.host ? '👑' : '👤'),

// ── ONLINE IMPOSTOR ────────────────────────────────────
function OnlineImpostorGame({ numPlayers, myIndex, myName, players, roomCode, isHost, db, myId, onBack }) {
  const [phase, setPhase] = useState('idle'); // idle | mode | category | shown | done
  const [mode, setMode] = useState(null);
  const [myWord, setMyWord] = useState(null);
  const [category, setCategory] = useState(null);
  const [hint, setHint] = useState(null);
  const [speakerIdx, setSpeakerIdx] = useState(null);
  const [isImpostor, setIsImpostor] = useState(false);
  const [countdown, setCountdown] = useState(null);
  const [totalCD, setTotalCD] = useState(4);
  const [roundNum, setRoundNum] = useState(0);
  const deckRef = useRef(shuffle(BASE_PAIRS));
  const usedRef = useRef([]);
  const e = React.createElement;

  // Listen for game updates from host
  useEffect(() => {
    const ref = firebase.database().ref('rooms/' + roomCode + '/currentRound');
    ref.on('value', snap => {
      const data = snap.val();
      if (!data) return;
      setCategory(data.category);
      setHint(data.hint);
      setSpeakerIdx(data.speakerIdx);
      setRoundNum(r => r + 1);
      // Each player reads their own word
      const myWord = data.words ? data.words[myIndex] : null;
      setMyWord(myWord);
      setIsImpostor(myWord === '__IMPOSTOR__');
      setPhase('category');
    });
    return () => ref.off();
  }, [roomCode, myIndex]);

  const hostStartRound = async (m) => {
    // Host generates and pushes round data
    const entry = deckRef.current.length > 0 ? deckRef.current.shift() : BASE_PAIRS[Math.floor(Math.random() * BASE_PAIRS.length)];
    usedRef.current.push(entry);
    const [a, b] = entry.words;
    const [majority, minority] = Math.random() < 0.5 ? [a, b] : [b, a];
    const impostorIdx = Math.floor(Math.random() * numPlayers);
    const spIdx = Math.floor(Math.random() * numPlayers);
    const words = Array(numPlayers).fill(majority);
    if (m === 'classic') words[impostorIdx] = minority;
    else words[impostorIdx] = '__IMPOSTOR__';
    await firebase.database().ref('rooms/' + roomCode + '/currentRound').set({
      category: entry.category, hint: entry.hint, words, speakerIdx: spIdx, mode: m
    });
    setMode(m);
  };

  const showMyWord = () => {
    const imp = myWord === '__IMPOSTOR__';
    const first = speakerIdx === myIndex;
    const secs = imp ? (first ? 7 : 5) : 4;
    setTotalCD(secs); setCountdown(secs); setPhase('shown');
  };

  useEffect(() => {
    if (phase !== 'shown' || countdown === null) return;
    if (countdown <= 0) { setPhase('done'); setCountdown(null); return; }
    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, countdown]);

  const showHint = isImpostor && speakerIdx === myIndex;

  if (phase === 'idle' || phase === 'mode') return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e('div', { style: sh.gameHeader },
        e('button', { style: sh.backBtn, onClick: onBack }, '← Sair'),
        e('div', { style: sh.gameTitleSmall }, 'impostor', e('span', { style: sh.gameTitleDot }, '.'))
      ),
      e(Tag, null, myName),
      isHost
        ? e('div', { style: { width: '100%' } },
            e('p', { style: { ...sh.eyebrow, marginBottom: 12, textAlign: 'center' } }, 'Escolha o modo'),
            e('div', { style: sh.modeGrid },
              e('button', { style: sh.modeCard, onClick: () => hostStartRound('classic') },
                e('span', { style: sh.modeEmoji }, '🃏'),
                e('span', { style: sh.modeName }, 'Clássico'),
                e('span', { style: sh.modeDesc }, 'Todos recebem uma palavra — o impostor recebe a diferente')
              ),
              e('button', { style: sh.modeCard, onClick: () => hostStartRound('blind') },
                e('span', { style: sh.modeEmoji }, '🕵️'),
                e('span', { style: sh.modeName }, 'Impostor Cego'),
                e('span', { style: sh.modeDesc }, 'O impostor sabe que é o impostor, mas não sabe a palavra')
              )
            )
          )
        : e('p', { style: sh.instruction }, 'Aguardando o host iniciar a rodada...')
    )
  );

  if (phase === 'category') return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e('div', { style: sh.roundBadge }, 'Rodada ' + roundNum),
      e('p', { style: sh.eyebrow }, 'Tema da rodada'),
      e('div', { style: sh.categoryBox },
        e('span', { style: { fontSize: 48 } }, CAT_ICONS[category] || '🎯'),
        e('span', { style: sh.categoryText }, category)
      ),
      e('p', { style: sh.instruction }, 'Todos veem o tema — mas um de vocês é o impostor!'),
      e(Btn, { onClick: showMyWord }, 'Ver minha palavra')
    )
  );

  if (phase === 'shown') return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e(Tag, null, myName),
      isImpostor
        ? e('div', { style: sh.impostorBox },
            e('span', { style: { fontSize: 32 } }, '🕵️'),
            e('span', { style: sh.impostorLabel }, 'Você é o'),
            e('span', { style: sh.impostorWord }, 'IMPOSTOR'),
            showHint
              ? e('div', { style: sh.hintBox },
                  e('span', { style: sh.hintLabel }, '💡 Dica para começar'),
                  e('span', { style: sh.hintText }, hint)
                )
              : e('span', { style: sh.impostorSubhint }, 'Finja que sabe e não seja pego!')
          )
        : e('div', { style: sh.wordBox }, e('span', { style: sh.wordText }, myWord)),
      e(CountdownRing, { countdown, total: totalCD, color: isImpostor ? '#7c3f3f' : '#e8e2d9' }),
      e('p', { style: sh.hint }, isImpostor ? 'Memorize. Ninguém pode saber.' : 'A palavra desaparecerá em breve')
    )
  );

  if (phase === 'done') return e('div', { style: sh.gameRoot },
    e('div', { style: sh.bg }),
    e(Screen, null,
      e('div', { style: sh.gameTitleSmall }, 'impostor', e('span', { style: sh.gameTitleDot }, '.')),
      e('div', { style: sh.themePill },
        e('span', null, CAT_ICONS[category] || '🎯'),
        e('span', { style: sh.themePillText }, category)
      ),
      e('div', { style: sh.speakerBox },
        e('p', { style: sh.speakerEyebrow }, 'Começa falando'),
        e('p', { style: sh.speakerName }, players[speakerIdx]?.name || playerLabel(speakerIdx)),
        e('p', { style: sh.speakerSub }, 'Os outros falam depois')
      ),
      isHost
        ? e(Btn, { onClick: () => setPhase('idle') }, 'Próxima rodada')
        : e('p', { style: sh.instruction }, 'Aguardando o host iniciar outra rodada...'),
      e(Btn, { ghost: true, onClick: onBack }, 'Sair da sala')
    )
  );

  return null;
}

// ── ONLINE IDADE ───────────────────────────────────────
function OnlineAgeGame({ numPlayers, myIndex, myName, players, roomCode, isHost, db, onBack }) {
  const [phase, setPhase] = useState('idle'); // idle | shown | done
  const [myAge, setMyAge] = useState(null);
  const [countdown, setCountdown] = useState(null);
  const e = React.createElement;
  const blueBg = 'radial-gradient(ellipse 80% 60% at 50% 0%, rgba(100,160,232,0.06) 0%, transparent 70%)';

  useEffect(() => {
    const ref = firebase.database().ref('rooms/' + roomCode + '/ageRound');
    ref.on('value', snap => {
      const data = snap.val();
      if (!data || !data.ages) return;
      setMyAge(data.ages[myIndex]);
      setPhase('reveal');
    });
    return () => ref.off();
  }, [roomCode, myIndex]);

  const hostStart = async () => {
    const pool = [];
    while (pool.length < numPlayers) {
      const age = Math.floor(Math.random() * 95) + 5;
      if (!pool.includes(age)) pool.push(age);
    }
    await firebase.database().ref('rooms/' + roomCode + '/ageRound').set({ ages: pool, startedAt: Date.now() });
  };

  const showMyAge = () => { setCountdown(4); setPhase('shown'); };

  useEffect(() => {
    if (phase !== 'shown' || countdown === null) return;
    if (countdown <= 0) { setPhase('done'); setCountdown(null); return; }
    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, countdown]);

  if (phase === 'idle') return e('div', { style: sh.gameRoot },
    e('div', { style: { ...sh.bg, background: blueBg } }),
    e(Screen, null,
